<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Chord · Review</title>
    <link rel="stylesheet" href="/assets/shared/tokens.css" />
    <link rel="stylesheet" href="{{ request.url_for('stage_one_static', path='stage_1_upload.css') }}" />
    <link rel="stylesheet" href="{{ request.url_for('stage_five_static', path='stage_5_review.css') }}" />
  </head>
  <body>
    <nav class="progress-tracker">
      <div class="progress-tracker-row">
        <ol class="progress-track">
          <li class="step complete" data-stage="upload" data-url="{{ stage_one_url }}">
            <span class="step-index">1</span>
            <span class="step-label">Upload</span>
          </li>
          <li class="connector complete"></li>
          <li class="step complete" data-stage="mapping" data-url="{{ stage_two_url }}">
            <span class="step-index">2</span>
            <span class="step-label">Map</span>
          </li>
          <li class="connector complete"></li>
          <li class="step complete" data-stage="harmonize" data-url="{{ stage_three_url }}">
            <span class="step-index">3</span>
            <span class="step-label">Harmonize</span>
          </li>
          <li class="connector complete"></li>
          <li class="step complete" data-stage="verify" data-url="{{ stage_four_url }}">
            <span class="step-index">4</span>
            <span class="step-label">Verify</span>
          </li>
          <li class="connector complete"></li>
          <li class="step active" data-stage="review" data-url="{{ request.url_for('stage_five_review_page') }}">
            <span class="step-index">5</span>
            <span class="step-label">Review</span>
          </li>
        </ol>
        <div id="uploadNavAction" class="progress-tracker-action hidden">
          <button class="btn-3d" type="button" data-nav-target="{{ stage_one_url }}">
            <span class="btn-3d-shadow" aria-hidden="true"></span>
            <span class="btn-3d-edge" aria-hidden="true"></span>
            <span class="btn-3d-front">Upload →</span>
          </button>
        </div>
      </div>
      <div id="stepInstruction" class="step-instruction">
        <p class="step-instruction-text"></p>
        <span class="step-instruction-tooltip" aria-hidden="true"></span>
      </div>
    </nav>

    <main class="stage-shell stage-five-shell">
      <section class="stage-card download-card">
        <div class="download-action-container">
          <button id="downloadResults" class="btn-3d" type="button">
            <span class="btn-3d-shadow" aria-hidden="true"></span>
            <span class="btn-3d-edge" aria-hidden="true"></span>
            <span class="btn-3d-front">Download harmonized data</span>
          </button>
        </div>
        <p id="downloadError" class="stage-error hidden"></p>
      </section>

      <section class="stage-card summary-card">
        <header class="summary-header">
          <h2 class="summary-title">Harmonization Summary</h2>
        </header>
        <div id="summaryGrid" class="summary-grid">
          <p class="summary-loading">Loading summary...</p>
        </div>
      </section>

      <section id="changesTableSection" class="stage-card changes-table-card hidden">
        <header class="summary-header">
          <h2 class="summary-title">Term Mappings</h2>
        </header>
        <div class="changes-table-container">
          <table id="changesTable" class="changes-table">
            <thead>
              <tr>
                <th>Column</th>
                <th>Original Value</th>
                <th>Final Value</th>
              </tr>
            </thead>
            <tbody id="changesTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      window.stageFiveConfig = {
        summaryEndpoint: {{ summary_endpoint|tojson }},
        downloadEndpoint: {{ download_endpoint|tojson }},
      };
    </script>
    <script type="module" src="{{ request.url_for('stage_five_static', path='stage_5_review.js') }}"></script>
  </body>
</html>
