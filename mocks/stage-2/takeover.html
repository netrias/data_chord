<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stage 2 redesign mock · v4 takeover</title>
<style>
:root {
  --netrias-500: #73b306; --netrias-600: #5e9205; --netrias-700: #4a7304;
  --netrias-100: #e8f5cc; --netrias-50: #f4fae6;
  --azure-500: #0673b3; --azure-600: #055c91; --azure-100: #cce4f5; --azure-50: #e6f2fa;
  --magenta-500: #b30673; --magenta-100: #f5cce4; --magenta-50: #fae6f2;
  --teal-700: #007c88; --teal-500: #00a7b3;
  --gray-900: #0f172a; --gray-800: #1e293b; --gray-700: #334155; --gray-600: #475569;
  --gray-500: #64748b; --gray-400: #94a3b8; --gray-300: #cbd5e1;
  --gray-200: #e2e8f0; --gray-100: #f1f5f9; --gray-50: #f8fafc;
  --white: #fff;
  --warning-700: #92400e; --warning-100: #fef3c7;
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
  --shadow-md: 0 4px 16px rgba(15,23,42,.08);
  --shadow-lg: 0 20px 60px rgba(15,23,42,.08);
  --shadow-xl: 0 30px 80px rgba(15,23,42,.18);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-2xl: 24px; --radius-full: 999px;
  --font: "Inter","Helvetica Neue",Arial,sans-serif;
  --mono: ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font);color:var(--gray-900);background:radial-gradient(circle at top,#f5fbfc,var(--gray-50) 60%);min-height:100vh;-webkit-font-smoothing:antialiased}
body.lock{overflow:hidden}

/* Tracker */
.tracker{background:var(--white);box-shadow:var(--shadow-lg);max-width:1400px;margin:0 auto;padding:1rem 2rem;border-radius:0 0 var(--radius-lg) var(--radius-lg);display:flex;align-items:center;gap:1.5rem}
.tracker ol{list-style:none;display:flex;align-items:center;gap:.25rem;padding:0;margin:0;flex:1;justify-content:center}
.tracker .step{display:flex;flex-direction:column;align-items:center;gap:.3rem;color:var(--gray-400);font-weight:600;min-width:70px;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
.tracker .idx{width:42px;height:42px;border-radius:50%;border:2px solid var(--gray-300);display:inline-flex;align-items:center;justify-content:center;font-size:.95rem;background:var(--white)}
.tracker .step.complete{color:var(--teal-700)}
.tracker .step.complete .idx{background:var(--netrias-500);border-color:var(--netrias-500);color:var(--white)}
.tracker .step.active{color:var(--netrias-700)}
.tracker .step.active .idx{background:var(--netrias-500);border-color:var(--netrias-500);color:var(--white);transform:scale(1.1)}
.tracker .conn{flex:1;height:3px;background:var(--gray-200);min-width:30px;border-radius:2px}
.tracker .conn.complete{background:linear-gradient(to right,var(--netrias-500),var(--teal-500))}
.harm-btn{background:linear-gradient(180deg,#8bc727,#6fa30a);color:#fff;border:none;border-radius:var(--radius-full);padding:.9rem 1.6rem;font-weight:600;font-size:1rem;cursor:pointer;box-shadow:0 4px 0 var(--netrias-700),0 6px 16px rgba(115,179,6,.35)}

/* Main shell — single column, full container width */
.shell{max-width:1400px;margin:0 auto;padding:1.5rem 1.5rem 4rem}
.card{background:var(--white);border-radius:var(--radius-2xl);box-shadow:var(--shadow-lg);padding:1.25rem 1.5rem 1.5rem}

/* Toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:.75rem;flex-wrap:wrap}
.chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .7rem;border:1px solid var(--gray-200);border-radius:var(--radius-full);background:var(--white);font-size:.78rem;font-weight:500;color:var(--gray-700);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--gray-400)}
.chip.active{background:var(--gray-900);color:var(--white);border-color:var(--gray-900)}
.chip .ico{font-size:.85rem}
.chip .count{color:var(--gray-500);font-variant-numeric:tabular-nums}
.chip.active .count{color:var(--gray-300)}
.col-search{padding:.4rem .75rem .4rem 2rem;font-size:.83rem;border:1px solid var(--gray-300);border-radius:var(--radius-full);width:240px;background:var(--white) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m20 20-3-3'/></svg>") no-repeat .65rem center;background-size:14px 14px;font-family:var(--font)}
.col-search:focus{outline:none;border-color:var(--azure-500);box-shadow:0 0 0 3px var(--azure-50)}

/* Legend */
.legend{display:flex;gap:1.25rem;margin-bottom:.6rem;font-size:.72rem;color:var(--gray-600)}
.legend .item{display:flex;align-items:center;gap:.4rem}
.legend .ico{width:18px;display:inline-flex;justify-content:center;font-size:.85rem}
.ico--rec{color:var(--netrias-600)}
.ico--ovr{color:var(--azure-500)}
.ico--none{color:var(--gray-400)}

/* Simple table — rows look like cards so the click affordance is obvious */
.tbl{width:100%}
.tbl-head,.row{display:grid;grid-template-columns:32px minmax(0,1fr) minmax(0,1.4fr) 22px;gap:1rem;align-items:center;padding:.65rem .85rem}
.tbl-head{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-500);font-weight:600;border-bottom:1px solid var(--gray-200);padding-top:.4rem;padding-bottom:.4rem;margin-bottom:.4rem}
.row{border-radius:var(--radius-md);cursor:pointer;border:1px solid var(--gray-100);background:var(--white);transition:all .12s;margin-bottom:.3rem}
.row:hover{background:var(--gray-50);border-color:var(--gray-300);box-shadow:var(--shadow-sm)}
.row:active{transform:scale(.998)}
.row .col{font-weight:600;color:var(--gray-900);font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.row .map{color:var(--gray-700);font-family:var(--mono);font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .map--empty{color:var(--gray-400);font-style:italic;font-family:var(--font)}
.row .map--none{color:var(--gray-500);font-style:italic;font-family:var(--font)}
.row .chev{color:var(--gray-500);text-align:center;font-size:1.15rem;font-weight:500;transition:transform .15s,color .15s}
.row:hover .chev{color:var(--azure-500);transform:translateX(3px)}
.status{font-size:1.05rem;text-align:center}

/* ── TAKEOVER ───────────────────────────────────────────────── */
.takeover{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;animation:tFadeIn .15s ease-out}
.takeover.hidden{display:none}
.takeover-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(2px)}
.takeover-card{position:relative;background:var(--white);border-radius:var(--radius-2xl);box-shadow:var(--shadow-xl);width:min(1280px,94vw);height:min(880px,92vh);display:flex;flex-direction:column;overflow:hidden;animation:tCardIn .18s ease-out}
@keyframes tFadeIn{from{opacity:0}to{opacity:1}}
@keyframes tCardIn{from{transform:translateY(12px) scale(.985);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}

/* Takeover head — three regions: identity left, conform message centered, nav right */
.takeover-head{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--gray-200);flex-shrink:0}
.th-left{display:flex;align-items:center;gap:.7rem;min-width:0;flex:0 0 auto;max-width:32%}
.th-center{flex:1 1 auto;display:flex;justify-content:center;min-width:0}
.th-status{font-size:1.2rem;flex-shrink:0}
.th-name{font-family:var(--mono);font-size:1.25rem;font-weight:700;color:var(--gray-900);margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.th-right{display:flex;align-items:center;gap:.5rem;flex:0 0 auto}
.th-counter{font-size:.78rem;color:var(--gray-500);margin-right:.5rem;font-variant-numeric:tabular-nums}
.conform-pill{display:inline-flex;align-items:center;gap:.45rem;padding:.4rem .85rem;background:var(--netrias-50);border:1px solid var(--netrias-100);border-radius:var(--radius-full);font-size:.83rem;color:var(--netrias-700);cursor:help;white-space:nowrap}
.conform-pill .ico{color:var(--netrias-600);font-weight:700}
.conform-pill b{color:var(--netrias-700);font-weight:700}
/* Neutral pill variant for pass-through CDEs (no green "matches" semantics) */
.conform-pill--neutral{background:var(--azure-50);border-color:var(--azure-100);color:var(--azure-600)}
.conform-pill--neutral .ico{color:var(--azure-500)}
/* Warning variant when the picked standard has zero matches — likely a poor fit */
.conform-pill--warning{background:var(--warning-100);border-color:#fde68a;color:var(--warning-700)}
.conform-pill--warning .ico{color:var(--warning-700)}
.conform-pill--warning b{color:var(--warning-700)}

/* Small type badge that sits inside the picker for non-PV CDEs */
.type-badge{font-size:.66rem;padding:.1rem .45rem;border-radius:var(--radius-sm);font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.type-badge--numeric{background:var(--azure-100);color:var(--azure-600)}
.type-badge--passthrough{background:var(--gray-200);color:var(--gray-700)}

/* Replaces the PV list when the target CDE has no PVs (numeric / passthrough) */
.type-card{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);color:var(--gray-700);min-height:0}
.type-card .type-icon{font-size:2.4rem;margin-bottom:.55rem;line-height:1;color:var(--azure-500)}
.type-card.passthrough .type-icon{color:var(--gray-500)}
.type-card .type-name{font-size:.95rem;font-weight:700;color:var(--gray-900);margin-bottom:.4rem}
.type-card .type-desc{font-size:.85rem;line-height:1.5;color:var(--gray-600);max-width:360px}
.t-btn{padding:.45rem .8rem;font-size:.83rem;font-weight:500;background:var(--white);border:1px solid var(--gray-300);border-radius:var(--radius-md);color:var(--gray-700);cursor:pointer;font-family:inherit}
.t-btn:hover:not(:disabled){background:var(--gray-50);border-color:var(--gray-400)}
.t-btn:disabled{opacity:.4;cursor:not-allowed}
.t-btn.icon{padding:.45rem .65rem;font-size:.95rem}
.t-btn.close{border-color:transparent}

/* Takeover body — two panes */
.takeover-body{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:0;overflow:hidden}
.t-pane{display:flex;flex-direction:column;min-height:0;min-width:0;padding:1.1rem 1.5rem 1.5rem}
.t-data{border-right:1px solid var(--gray-100)}
.pane-head{display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:.85rem;flex-shrink:0}
.pane-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);font-weight:600;margin:0}
.pane-meta{font-size:.78rem;color:var(--gray-600)}
.pane-meta b{color:var(--gray-900);font-weight:600}

/* Conformance summary line */
.conform-summary{padding:.55rem .75rem;background:var(--netrias-50);border:1px solid var(--netrias-100);border-radius:var(--radius-sm);font-size:.82rem;color:var(--netrias-700);margin-bottom:.6rem;flex-shrink:0;display:flex;align-items:center;gap:.5rem}
.conform-summary b{font-weight:700}
.conform-summary .ico{color:var(--netrias-600);font-weight:700}

/* Pane search */
.pane-search-wrap{display:flex;gap:.5rem;margin-bottom:.6rem;flex-shrink:0}
.pane-search{flex:1;padding:.45rem .65rem .45rem 2rem;font-size:.84rem;border:1px solid var(--gray-300);border-radius:var(--radius-sm);background:var(--white) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m20 20-3-3'/></svg>") no-repeat .65rem center;background-size:14px 14px;font-family:var(--font)}
.pane-search:focus{outline:none;border-color:var(--azure-500);box-shadow:0 0 0 3px var(--azure-50)}
.pane-total{font-size:.76rem;color:var(--gray-500);font-variant-numeric:tabular-nums;align-self:center;flex-shrink:0;white-space:nowrap}
.pane-total b{color:var(--gray-900);font-weight:700}

/* Pane list */
.pane-list{flex:1;overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--gray-50);min-height:0}
.pane-list ul{list-style:none;margin:0;padding:0}

/* Sample list (your data) — sticky table-style header above virtualized rows */
.data-cols-head{position:sticky;top:0;z-index:2;display:grid;grid-template-columns:18px minmax(0,1fr) 64px;gap:.6rem;padding:.45rem .8rem;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);font-weight:600;background:var(--gray-100);border-bottom:1px solid var(--gray-200)}
.data-cols-head>span:last-child{text-align:right}
.samples-full li{display:grid;grid-template-columns:18px minmax(0,1fr) 64px;gap:.6rem;align-items:center;padding:.4rem .8rem;font-size:.86rem;border-bottom:1px solid var(--gray-200);content-visibility:auto;contain-intrinsic-size:auto 32px}
.samples-full li:last-child{border-bottom:none}
.samples-full li.match{background:var(--netrias-50)}
.samples-full .ok{color:var(--netrias-600);font-weight:700;font-size:.85rem;text-align:center;cursor:help}
.samples-full .v{color:var(--gray-700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:.83rem}
.samples-full li.match .v{color:var(--netrias-700)}
.samples-full .c{color:var(--gray-500);font-variant-numeric:tabular-nums;font-size:.78rem;text-align:right}

/* PV list */
.pv-list-full li{padding:.4rem .8rem;font-size:.84rem;color:var(--gray-700);border-bottom:1px solid var(--gray-200);font-family:var(--mono);content-visibility:auto;contain-intrinsic-size:auto 32px}
.pv-list-full li:last-child{border-bottom:none}
.pv-list-full li.match{background:var(--netrias-50);color:var(--netrias-700)}
.pv-list-full li.match::before{content:"\2713\00a0";color:var(--netrias-600);font-weight:700}

.pane-empty{padding:1.5rem;text-align:center;color:var(--gray-500);font-size:.85rem}

/* CDE picker */
.cde-picker-wrap{position:relative;flex-shrink:0;margin-bottom:.7rem}
.cde-picker{display:flex;align-items:center;gap:.6rem;width:100%;padding:.7rem .9rem;background:var(--white);border:1px solid var(--gray-300);border-radius:var(--radius-md);cursor:pointer;font-family:inherit;text-align:left}
.cde-picker:hover{border-color:var(--gray-400)}
.cde-picker .name{font-family:var(--mono);font-weight:600;color:var(--gray-900);font-size:.95rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.cde-picker .none-text{font-family:var(--font);font-style:italic;color:var(--gray-500);font-weight:500}
.cde-picker .placeholder-text{font-family:var(--font);font-style:italic;color:var(--gray-400);font-weight:500}
.cde-picker .count{font-size:.78rem;color:var(--gray-500);font-variant-numeric:tabular-nums;flex-shrink:0;cursor:help}
.cde-picker .count b{color:var(--gray-900);font-weight:700}
.cde-picker .count.high b{color:var(--netrias-700)}
.cde-picker .caret{color:var(--gray-400);font-size:.7rem;flex-shrink:0}
.ai-badge{font-size:.66rem;background:var(--netrias-100);color:var(--netrias-700);padding:.1rem .45rem;border-radius:var(--radius-sm);font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;display:inline-flex;align-items:center;gap:.25rem}

/* Dropdown — same structure as v3 */
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1px solid var(--gray-300);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);z-index:60;max-height:520px;display:flex;flex-direction:column;overflow:hidden}
.dd-search{padding:.55rem .8rem;border-bottom:1px solid var(--gray-100)}
.dd-search input{width:100%;padding:.4rem .6rem .4rem 1.9rem;font-size:.82rem;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m20 20-3-3'/></svg>") no-repeat .55rem center;background-size:13px 13px;font-family:var(--font)}
.dd-search input:focus{outline:none;border-color:var(--azure-500)}
.dd-list{overflow-y:auto;flex:1;padding:.25rem 0}
.dd-opt{padding:.55rem .85rem;cursor:pointer;border-left:3px solid transparent}
.dd-opt:hover{background:var(--gray-50)}
.dd-opt.ai{background:var(--netrias-50);border-left-color:var(--netrias-500)}
.dd-opt.ai:hover{background:var(--netrias-100)}
.dd-opt.none{border-left-color:var(--gray-300)}
.dd-row{display:flex;align-items:center;gap:.5rem;min-width:0}
.dd-opt .name{font-family:var(--mono);color:var(--gray-900);font-size:.86rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;min-width:0}
.dd-opt.none .name{font-family:var(--font);font-style:italic;color:var(--gray-700)}
.dd-opt .count{color:var(--gray-500);font-variant-numeric:tabular-nums;font-size:.76rem;flex-shrink:0;margin-left:auto;cursor:help}
.dd-opt .count b{color:var(--gray-900);font-weight:600}
.dd-opt .count.high b{color:var(--netrias-700)}
.dd-opt .count.zero{color:var(--gray-300)}
.dd-desc{font-size:.76rem;color:var(--gray-500);margin-top:.2rem;line-height:1.4}
.dd-divider{height:1px;background:var(--gray-100);margin:.3rem 0}
.dd-empty{padding:1.2rem;text-align:center;color:var(--gray-500);font-size:.82rem}

/* Target info block (description, note, and PV count merged) */
.cde-info{background:var(--gray-50);border-radius:var(--radius-sm);padding:.6rem .8rem;margin-bottom:.7rem;font-size:.84rem;line-height:1.5;color:var(--gray-700);flex-shrink:0}
.cde-info p{margin:0}
.cde-info .cde-note{color:var(--gray-500);font-size:.78rem;margin-top:.3rem}
.cde-info .cde-count{font-size:.76rem;color:var(--gray-500);margin-top:.45rem;padding-top:.4rem;border-top:1px solid var(--gray-200);font-variant-numeric:tabular-nums}
.cde-info .cde-count b{color:var(--gray-900);font-weight:700}

/* Unique-msg & target empty */
.unique-msg{padding:.65rem .8rem;font-size:.84rem;color:var(--gray-700);background:var(--azure-50);border:1px solid var(--azure-100);border-radius:var(--radius-sm);margin-bottom:.6rem;line-height:1.5;flex-shrink:0}
.unique-msg b{color:var(--gray-900)}
.target-empty{padding:1.5rem;text-align:center;color:var(--gray-500);font-size:.88rem;line-height:1.5;background:var(--gray-50);border-radius:var(--radius-sm)}

/* Responsive: stack panes on narrow viewports */
@media (max-width:900px){
  .takeover-body{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  .t-data{border-right:none;border-bottom:1px solid var(--gray-100)}
}
</style>
</head>
<body>

<nav class="tracker">
  <ol>
    <li class="step complete"><span class="idx">✓</span><span>Upload</span></li>
    <li class="conn complete"></li>
    <li class="step active"><span class="idx">2</span><span>Map</span></li>
    <li class="conn"></li>
    <li class="step"><span class="idx">3</span><span>Harmonize</span></li>
    <li class="conn"></li>
    <li class="step"><span class="idx">4</span><span>Verify</span></li>
    <li class="conn"></li>
    <li class="step"><span class="idx">5</span><span>Review</span></li>
  </ol>
  <button class="harm-btn">Harmonize →</button>
</nav>

<main class="shell">
  <section class="card">
    <div class="toolbar">
      <div class="chips" id="filterChips"></div>
      <input type="search" class="col-search" id="colSearch" placeholder="Filter columns…" />
    </div>

    <div class="tbl">
      <div class="tbl-head">
        <div></div>
        <div>Your column</div>
        <div>Target standard</div>
        <div></div>
      </div>
      <div id="rows"></div>
    </div>
  </section>
</main>

<div class="takeover hidden" id="takeover">
  <div class="takeover-backdrop" data-action="close"></div>
  <div class="takeover-card" id="takeoverCard"></div>
</div>

<script src="data.js"></script>
<script>
const STATUS = { rec: "✦", ovr: "✎", none: "○" };
const STATUS_CLASS = { rec: "ico--rec", ovr: "ico--ovr", none: "ico--none" };
const NO_MAP = "__none__";
const MATCH_TIP = "Distinct values in your column that exactly match a permissible value of this CDE.";
const CONFORM_TIP = "Conformant — value already matches a permissible value of the target CDE.";
const NO_MAP_DESC = "Skip this column. Values will not be harmonized to any standard.";

const data = window.mockData;
const cdeByKey = new Map(data.cde_catalog.map(c => [c.key, c]));
const noteByKey = data.cde_notes;
const pvsByKey = data.cde_pvs;

const state = {
  filterStatus: "all",
  filterText: "",
  overrides: new Map(),
  takeoverKey: null,
  pickerOpen: false,
};

function effectiveStatus(col) {
  if (state.overrides.has(col.key)) {
    return state.overrides.get(col.key) === NO_MAP ? "none" : "ovr";
  }
  return col.status;
}
function effectiveCde(col) {
  if (state.overrides.has(col.key)) {
    const v = state.overrides.get(col.key);
    return v === NO_MAP ? null : v;
  }
  return col.override_cde || col.ai_cde;
}
function filteredColumns() {
  return data.columns.filter(c => {
    if (state.filterStatus !== "all" && effectiveStatus(c) !== state.filterStatus) return false;
    if (state.filterText && !c.header.toLowerCase().includes(state.filterText)) return false;
    return true;
  });
}

/* ─── Filter chips ─────────────────────────────────────────── */
const filterChips = document.getElementById("filterChips");
function renderChips() {
  const counts = { all: data.columns.length, rec: 0, ovr: 0, none: 0 };
  for (const c of data.columns) counts[effectiveStatus(c)]++;
  const items = [
    { key: "all", label: "All" },
    { key: "rec", label: "AI Recommendation", icon: "✦", cls: "ico--rec" },
    { key: "ovr", label: "Override", icon: "✎", cls: "ico--ovr" },
    { key: "none", label: "No Mapping", icon: "○", cls: "ico--none" },
  ];
  filterChips.innerHTML = items.map(it => `
    <button class="chip ${state.filterStatus === it.key ? "active" : ""}" data-key="${it.key}">
      ${it.icon ? `<span class="ico ${it.cls}">${it.icon}</span>` : ""}
      <span>${it.label}</span>
      <span class="count">${counts[it.key]}</span>
    </button>
  `).join("");
}
filterChips.addEventListener("click", e => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  state.filterStatus = btn.dataset.key;
  renderChips();
  renderRows();
});
document.getElementById("colSearch").addEventListener("input", e => {
  state.filterText = e.target.value.toLowerCase();
  renderRows();
});

/* ─── Rows ─────────────────────────────────────────────────── */
const rowsEl = document.getElementById("rows");
function renderRows() {
  const filtered = filteredColumns();
  rowsEl.innerHTML = filtered.map(rowHtml).join("");
}
function rowHtml(col) {
  const status = effectiveStatus(col);
  const override = state.overrides.get(col.key);
  let mapHtml;
  if (override === NO_MAP) {
    mapHtml = `<span class="map map--none">No Mapping</span>`;
  } else {
    const cde = effectiveCde(col);
    mapHtml = cde
      ? `<span class="map" title="${escapeAttr(cde)}">${escapeHtml(cde)}</span>`
      : `<span class="map map--empty">— no mapping yet</span>`;
  }
  return `
    <div class="row" data-key="${col.key}">
      <div class="status ${STATUS_CLASS[status]}" title="${status}">${STATUS[status]}</div>
      <div class="col" title="${escapeAttr(col.header)}">${escapeHtml(col.header)}</div>
      ${mapHtml}
      <div class="chev">›</div>
    </div>
  `;
}
rowsEl.addEventListener("click", e => {
  const row = e.target.closest(".row");
  if (!row) return;
  openTakeover(row.dataset.key);
});

/* ─── Takeover ─────────────────────────────────────────────── */
const takeoverEl = document.getElementById("takeover");
const cardEl = document.getElementById("takeoverCard");

function openTakeover(colKey) {
  state.takeoverKey = colKey;
  state.pickerOpen = false;
  document.body.classList.add("lock");
  takeoverEl.classList.remove("hidden");
  renderTakeover();
}
function closeTakeover() {
  state.takeoverKey = null;
  state.pickerOpen = false;
  takeoverEl.classList.add("hidden");
  document.body.classList.remove("lock");
}
function navigate(delta) {
  const list = filteredColumns();
  const i = list.findIndex(c => c.key === state.takeoverKey);
  const ni = i + delta;
  if (ni < 0 || ni >= list.length) return;
  state.takeoverKey = list[ni].key;
  state.pickerOpen = false;
  renderTakeover();
}

function renderTakeover() {
  const col = data.columns.find(c => c.key === state.takeoverKey);
  if (!col) { closeTakeover(); return; }
  const list = filteredColumns();
  const idx = list.findIndex(c => c.key === col.key);
  const status = effectiveStatus(col);
  const cde = effectiveCde(col);

  const matchN = cde ? (col.match_counts[cde] || 0) : 0;
  const cdeType = cde ? (cdeByKey.get(cde)?.type || "pv") : "pv";
  let conformPill = "";
  if (cde) {
    if (cdeType === "passthrough") {
      conformPill = `
        <div class="conform-pill conform-pill--neutral" title="Pass-through field — values are stored as-is without validation.">
          <span class="ico">↪</span>
          <span>Pass-through field — values stored as-is</span>
        </div>
      `;
    } else if (cdeType === "numeric") {
      const verb = "are numeric";
      const tip = "Distinct values in your column that parse as numbers.";
      conformPill = matchN > 0 ? `
        <div class="conform-pill" title="${tip}">
          <span class="ico">✓</span>
          <span><b>${matchN.toLocaleString()}</b> of <b>${col.distinct.toLocaleString()}</b> distinct values ${verb}</span>
        </div>
      ` : `
        <div class="conform-pill conform-pill--warning" title="${tip}">
          <span class="ico">⚠</span>
          <span><b>0</b> of <b>${col.distinct.toLocaleString()}</b> distinct values ${verb}</span>
        </div>
      `;
    } else {
      const tip = MATCH_TIP;
      conformPill = matchN > 0 ? `
        <div class="conform-pill" title="${tip}">
          <span class="ico">✓</span>
          <span><b>${matchN.toLocaleString()}</b> of <b>${col.distinct.toLocaleString()}</b> distinct values match</span>
        </div>
      ` : `
        <div class="conform-pill conform-pill--warning" title="${tip}">
          <span class="ico">⚠</span>
          <span><b>0</b> of <b>${col.distinct.toLocaleString()}</b> distinct values match</span>
        </div>
      `;
    }
  }

  cardEl.innerHTML = `
    <header class="takeover-head">
      <div class="th-left">
        <span class="th-status ${STATUS_CLASS[status]}">${STATUS[status]}</span>
        <h2 class="th-name" title="${escapeAttr(col.header)}">${escapeHtml(col.header)}</h2>
      </div>
      <div class="th-center">${conformPill}</div>
      <div class="th-right">
        <span class="th-counter">${idx + 1} of ${list.length}</span>
        <button class="t-btn" data-action="prev" ${idx <= 0 ? "disabled" : ""}>← Prev</button>
        <button class="t-btn" data-action="next" ${idx >= list.length - 1 ? "disabled" : ""}>Next →</button>
        <button class="t-btn icon close" data-action="close" aria-label="Close">✕</button>
      </div>
    </header>
    <div class="takeover-body">
      <section class="t-pane t-data">${renderDataPane(col, cde)}</section>
      <section class="t-pane t-target">${renderTargetPane(col, cde)}</section>
    </div>
  `;
  bindTakeoverEvents(col);
}

/* ─── Data pane — virtualized list of every distinct value ──── */
function renderDataPane(col, _cde) {
  const uniqueMsg = col.all_unique ? `
    <div class="unique-msg"><b>All ${col.distinct.toLocaleString()} values are unique</b> — likely an identifier or date. Mapping is rarely useful for these.</div>
  ` : "";
  return `
    <div class="pane-head">
      <h3 class="pane-title">Your column</h3>
    </div>
    ${uniqueMsg}
    <div class="pane-list" id="dataList">
      <div class="data-cols-head">
        <span aria-hidden="true"></span>
        <span>Value</span>
        <span>Count</span>
      </div>
      <ul class="samples-full">${renderSamples(col.samples, "")}</ul>
    </div>
  `;
}

function renderSamples(samples, q) {
  const lq = q.toLowerCase();
  const filtered = q ? samples.filter(s => s.v.toLowerCase().includes(lq)) : samples;
  if (!filtered.length) return `<li class="pane-empty">No values match "${escapeHtml(q)}"</li>`;
  return filtered.map(s => `
    <li class="${s.match ? "match" : ""}">
      <span class="ok" ${s.match ? `title="${CONFORM_TIP}"` : ""}>${s.match ? "✓" : ""}</span>
      <span class="v" title="${escapeAttr(s.v)}">${escapeHtml(s.v)}</span>
      <span class="c">${s.c.toLocaleString()}</span>
    </li>
  `).join("");
}

/* ─── Target pane ──────────────────────────────────────────── */
function renderTargetPane(col, cde) {
  const meta = cde ? cdeByKey.get(cde) : null;
  const desc = meta ? meta.description : "";
  const note = cde ? noteByKey[cde] : null;
  const pvs = cde ? (pvsByKey[cde] || []) : [];
  const sampleValues = new Set(col.samples.map(s => s.v));
  const matchN = cde ? (col.match_counts[cde] || 0) : 0;
  const isAi = cde && cde === col.ai_cde && !state.overrides.has(col.key);
  const isNone = state.overrides.get(col.key) === NO_MAP;

  let pickerInner;
  if (isNone) {
    pickerInner = `<span class="name none-text">No Mapping</span><span class="caret">▾</span>`;
  } else if (!cde) {
    pickerInner = `<span class="name placeholder-text">Select a target standard…</span><span class="caret">▾</span>`;
  } else {
    // Match count omitted here — already shown in the takeover header pill.
    // It still appears next to each option inside the dropdown.
    const cdeType = meta?.type || "pv";
    const typeBadge = cdeType === "numeric"
      ? `<span class="type-badge type-badge--numeric">Numeric</span>`
      : cdeType === "passthrough"
        ? `<span class="type-badge type-badge--passthrough">Pass-through</span>`
        : "";
    pickerInner = `
      <span class="name" title="${escapeAttr(cde)}">${escapeHtml(cde)}</span>
      ${typeBadge}
      ${isAi ? `<span class="ai-badge">✦ AI rec</span>` : ""}
      <span class="caret" style="margin-left:auto">▾</span>
    `;
  }

  const head = `
    <div class="pane-head">
      <h3 class="pane-title">Target standard</h3>
    </div>
    <div class="cde-picker-wrap" id="pickerWrap">
      <button class="cde-picker" id="cdePicker">${pickerInner}</button>
    </div>
  `;

  if (!cde) {
    return head + `<div class="target-empty">No target selected.<br/>Choose a standard from the picker above to see its permissible values.</div>`;
  }

  const cdeType = meta?.type || "pv";

  // PV-typed CDEs: info card lists the value count, then the PV list.
  if (cdeType === "pv") {
    const infoHtml = `
      <div class="cde-info">
        ${desc ? `<p>${escapeHtml(desc)}</p>` : ""}
        ${note ? `<p class="cde-note">${escapeHtml(note)}</p>` : ""}
        <p class="cde-count"><b>${pvs.length.toLocaleString()}</b> permissible values</p>
      </div>
    `;
    return head + infoHtml + `
      <div class="pane-list" id="pvList"><ul class="pv-list-full">${renderPvs(pvs, sampleValues, "")}</ul></div>
    `;
  }

  // Numeric / passthrough: no PV list. Info card omits the count line; the
  // explanatory card below explains how validation works for this type.
  const infoHtml = `
    <div class="cde-info">
      ${desc ? `<p>${escapeHtml(desc)}</p>` : ""}
      ${note ? `<p class="cde-note">${escapeHtml(note)}</p>` : ""}
    </div>
  `;
  if (cdeType === "numeric") {
    return head + infoHtml + `
      <div class="type-card">
        <div class="type-icon">123</div>
        <div class="type-name">Numeric field</div>
        <div class="type-desc">Values are validated as numbers, not against a fixed list of permissible values.</div>
      </div>
    `;
  }
  // passthrough
  return head + infoHtml + `
    <div class="type-card passthrough">
      <div class="type-icon">↪</div>
      <div class="type-name">Pass-through field</div>
      <div class="type-desc">Values are stored as-is. There is no permissible value list and no validation against a standard.</div>
    </div>
  `;
}

function renderPvs(pvs, sampleValues, q) {
  const lq = q.toLowerCase();
  const filtered = q ? pvs.filter(p => p.toLowerCase().includes(lq)) : pvs;
  if (!filtered.length) return `<li class="pane-empty">No matches for "${escapeHtml(q)}"</li>`;
  return filtered.map(p => `<li class="${sampleValues.has(p) ? "match" : ""}">${escapeHtml(p)}</li>`).join("");
}

/* ─── CDE picker dropdown ──────────────────────────────────── */
function togglePicker() {
  if (state.pickerOpen) { closePicker(); return; }
  const col = data.columns.find(c => c.key === state.takeoverKey);
  if (!col) return;
  const aiKey = col.ai_cde;
  const opts = data.cde_catalog
    .map(c => ({ ...c, matches: col.match_counts[c.key] || 0 }))
    .filter(c => c.key !== aiKey)
    .sort((a, b) => b.matches - a.matches || a.label.localeCompare(b.label));
  const aiOption = aiKey ? { ...cdeByKey.get(aiKey), matches: col.match_counts[aiKey] || 0 } : null;

  const wrap = document.getElementById("pickerWrap");
  const dd = document.createElement("div");
  dd.className = "dropdown";
  dd.id = "pickerDropdown";
  dd.innerHTML = `
    <div class="dd-search"><input type="search" id="ddSearch" placeholder="Filter standards by name or description…" autocomplete="off" /></div>
    <div class="dd-list" id="ddList">${renderDropdownItems(col, aiOption, opts, "")}</div>
  `;
  wrap.appendChild(dd);
  state.pickerOpen = true;
  setTimeout(() => dd.querySelector("input").focus(), 0);
  dd.querySelector("input").addEventListener("input", e => {
    document.getElementById("ddList").innerHTML = renderDropdownItems(col, aiOption, opts, e.target.value);
  });
  dd.addEventListener("click", e => {
    const opt = e.target.closest(".dd-opt");
    if (!opt) return;
    pickOverride(state.takeoverKey, opt.dataset.value);
    closePicker();
    renderTakeover();
    renderRows();
    renderChips();
  });
}
function closePicker() {
  state.pickerOpen = false;
  const dd = document.getElementById("pickerDropdown");
  if (dd) dd.remove();
}

function renderDropdownItems(col, aiOption, opts, q) {
  const lq = q.toLowerCase();
  const matches = c => !lq
    || (c.label || c.key).toLowerCase().includes(lq)
    || (c.description || "").toLowerCase().includes(lq);

  const sections = [];
  if (aiOption && matches(aiOption)) sections.push(optHtml(aiOption, "ai"));
  if (!q) {
    sections.push(optHtml({ key: NO_MAP, label: "No Mapping", description: NO_MAP_DESC }, "none"));
  }
  if (sections.length) sections.push(`<div class="dd-divider"></div>`);
  const others = opts.filter(matches);
  others.forEach(o => sections.push(optHtml(o, "alt")));
  if (!sections.length || (others.length === 0 && !aiOption && q)) {
    return `<div class="dd-empty">No standards match "${escapeHtml(q)}"</div>`;
  }
  return sections.join("");
}
function optHtml(c, kind) {
  const showMatch = kind !== "none";
  const matchHtml = showMatch ? `
    <span class="count ${c.matches > 0 ? "high" : "zero"}" title="${MATCH_TIP}">
      ${c.matches > 0 ? `<b>${c.matches.toLocaleString()}</b> matches` : "0 matches"}
    </span>` : "";
  const aiBadge = kind === "ai" ? `<span class="ai-badge">✦ AI rec</span>` : "";
  const typeBadge = c.type === "numeric"
    ? `<span class="type-badge type-badge--numeric">Numeric</span>`
    : c.type === "passthrough"
      ? `<span class="type-badge type-badge--passthrough">Pass-through</span>`
      : "";
  const desc = c.description ? `<div class="dd-desc">${escapeHtml(c.description)}</div>` : "";
  return `
    <div class="dd-opt ${kind}" data-value="${c.key}">
      <div class="dd-row">
        <span class="name" title="${escapeAttr(c.label || c.key)}">${escapeHtml(c.label || c.key)}</span>
        ${typeBadge}
        ${aiBadge}
        ${matchHtml}
      </div>
      ${desc}
    </div>
  `;
}
function pickOverride(colKey, value) {
  const col = data.columns.find(c => c.key === colKey);
  if (col.ai_cde && value === col.ai_cde) {
    state.overrides.delete(colKey);
  } else {
    state.overrides.set(colKey, value);
  }
}

/* ─── Event wiring ─────────────────────────────────────────── */
function bindTakeoverEvents(col) {
  cardEl.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", () => {
      const action = el.dataset.action;
      if (action === "close") closeTakeover();
      else if (action === "prev") navigate(-1);
      else if (action === "next") navigate(1);
    });
  });
  const pvSearch = document.getElementById("pvSearch");
  if (pvSearch) {
    const cde = effectiveCde(col);
    const pvs = cde ? pvsByKey[cde] : [];
    const sampleValues = new Set(col.samples.map(s => s.v));
    pvSearch.addEventListener("input", e => {
      document.getElementById("pvList").innerHTML = `<ul class="pv-list-full">${renderPvs(pvs, sampleValues, e.target.value)}</ul>`;
    });
  }
  const picker = document.getElementById("cdePicker");
  if (picker) {
    picker.addEventListener("click", e => { e.stopPropagation(); togglePicker(); });
  }
}

document.addEventListener("click", e => {
  if (state.pickerOpen && !e.target.closest("#pickerDropdown") && !e.target.closest("#cdePicker")) {
    closePicker();
  }
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    if (state.pickerOpen) { closePicker(); return; }
    if (state.takeoverKey) closeTakeover();
    return;
  }
  if (!state.takeoverKey || state.pickerOpen) return;
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowLeft") navigate(-1);
  else if (e.key === "ArrowRight") navigate(1);
});
takeoverEl.querySelector(".takeover-backdrop").addEventListener("click", () => closeTakeover());

/* ─── Utils ────────────────────────────────────────────────── */
function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
function escapeAttr(s) {
  return String(s).replace(/["'&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

renderChips();
renderRows();
</script>
</body>
</html>
