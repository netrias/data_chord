version: 0.2

env:
  shell: bash

phases:
  install:
    commands:
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - export PATH="$HOME/.local/bin:$PATH"
  pre_build:
    commands:
      - export PATH="$HOME/.local/bin:$PATH"
      - uv sync --extra dev
      - uv run ruff check .
      - uv run basedpyright
      - uv run pytest
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - export SOURCE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-}"
      - if [ -z "$SOURCE_TAG" ]; then echo "CODEBUILD_RESOLVED_SOURCE_VERSION is required for immutable image tags"; exit 1; fi
      - export IMAGE_TAG="$(echo "$SOURCE_TAG" | cut -c1-12)"
  build:
    commands:
      - docker build -t "$IMAGE_REPO_URI:$IMAGE_TAG" .
  post_build:
    commands:
      - if [ "$CODEBUILD_BUILD_SUCCEEDING" != "1" ]; then echo "Build failed; skipping image push"; exit 1; fi
      - docker push "$IMAGE_REPO_URI:$IMAGE_TAG"
