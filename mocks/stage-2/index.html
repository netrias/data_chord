<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stage 2 redesign mock · v3</title>
<style>
:root {
  --netrias-500: #73b306; --netrias-600: #5e9205; --netrias-700: #4a7304;
  --netrias-100: #e8f5cc; --netrias-50: #f4fae6;
  --azure-500: #0673b3; --azure-600: #055c91; --azure-100: #cce4f5; --azure-50: #e6f2fa;
  --magenta-500: #b30673; --magenta-100: #f5cce4; --magenta-50: #fae6f2;
  --teal-700: #007c88; --teal-500: #00a7b3;
  --gray-900: #0f172a; --gray-800: #1e293b; --gray-700: #334155; --gray-600: #475569;
  --gray-500: #64748b; --gray-400: #94a3b8; --gray-300: #cbd5e1;
  --gray-200: #e2e8f0; --gray-100: #f1f5f9; --gray-50: #f8fafc;
  --white: #fff;
  --warning-700: #92400e; --warning-100: #fef3c7;
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
  --shadow-md: 0 4px 16px rgba(15,23,42,.08);
  --shadow-lg: 0 20px 60px rgba(15,23,42,.08);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-2xl: 24px; --radius-full: 999px;
  --font: "Inter","Helvetica Neue",Arial,sans-serif;
  --mono: ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font);color:var(--gray-900);background:radial-gradient(circle at top,#f5fbfc,var(--gray-50) 60%);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Tracker */
.tracker{background:var(--white);box-shadow:var(--shadow-lg);max-width:1400px;margin:0 auto;padding:1rem 2rem;border-radius:0 0 var(--radius-lg) var(--radius-lg);display:flex;align-items:center;gap:1.5rem}
.tracker ol{list-style:none;display:flex;align-items:center;gap:.25rem;padding:0;margin:0;flex:1;justify-content:center}
.tracker .step{display:flex;flex-direction:column;align-items:center;gap:.3rem;color:var(--gray-400);font-weight:600;min-width:70px;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
.tracker .idx{width:42px;height:42px;border-radius:50%;border:2px solid var(--gray-300);display:inline-flex;align-items:center;justify-content:center;font-size:.95rem;background:var(--white)}
.tracker .step.complete{color:var(--teal-700)}
.tracker .step.complete .idx{background:var(--netrias-500);border-color:var(--netrias-500);color:var(--white)}
.tracker .step.active{color:var(--netrias-700)}
.tracker .step.active .idx{background:var(--netrias-500);border-color:var(--netrias-500);color:var(--white);transform:scale(1.1)}
.tracker .conn{flex:1;height:3px;background:var(--gray-200);min-width:30px;border-radius:2px}
.tracker .conn.complete{background:linear-gradient(to right,var(--netrias-500),var(--teal-500))}
.harm-btn{background:linear-gradient(180deg,#8bc727,#6fa30a);color:#fff;border:none;border-radius:var(--radius-full);padding:.9rem 1.6rem;font-weight:600;font-size:1rem;cursor:pointer;box-shadow:0 4px 0 var(--netrias-700),0 6px 16px rgba(115,179,6,.35)}

/* Layout */
.shell{max-width:1400px;margin:0 auto;padding:1.5rem 1.5rem 4rem;display:grid;grid-template-columns:minmax(0,1fr) 480px;gap:1.5rem;align-items:start}
.card{background:var(--white);border-radius:var(--radius-2xl);box-shadow:var(--shadow-lg);padding:1.25rem 1.5rem 1.5rem}

/* Banner */
.banner{font-size:.78rem;background:var(--warning-100);color:var(--warning-700);padding:.45rem .75rem;border-radius:var(--radius-sm);margin-bottom:1rem;display:inline-block;font-family:var(--mono)}

/* Toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:.75rem;flex-wrap:wrap}
.chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .7rem;border:1px solid var(--gray-200);border-radius:var(--radius-full);background:var(--white);font-size:.78rem;font-weight:500;color:var(--gray-700);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--gray-400)}
.chip.active{background:var(--gray-900);color:var(--white);border-color:var(--gray-900)}
.chip .ico{font-size:.85rem}
.chip .count{color:var(--gray-500);font-variant-numeric:tabular-nums}
.chip.active .count{color:var(--gray-300)}
.col-search{padding:.4rem .75rem .4rem 2rem;font-size:.83rem;border:1px solid var(--gray-300);border-radius:var(--radius-full);width:240px;background:var(--white) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m20 20-3-3'/></svg>") no-repeat .65rem center;background-size:14px 14px;font-family:var(--font)}
.col-search:focus{outline:none;border-color:var(--azure-500);box-shadow:0 0 0 3px var(--azure-50)}

/* Legend */
.legend{display:flex;gap:1.25rem;margin-bottom:.6rem;font-size:.72rem;color:var(--gray-600)}
.legend .item{display:flex;align-items:center;gap:.4rem}
.legend .ico{width:18px;display:inline-flex;justify-content:center;font-size:.85rem}
.ico--rec{color:var(--netrias-600)}
.ico--ovr{color:var(--azure-500)}
.ico--none{color:var(--gray-400)}

/* Table — 3 columns: status, your column, override */
.tbl{width:100%}
.tbl-head,.row{display:grid;grid-template-columns:32px minmax(0,1fr) minmax(0,1.4fr);gap:1rem;align-items:center;padding:.6rem .8rem}
.tbl-head{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-500);font-weight:600;border-bottom:1px solid var(--gray-200);padding-top:.4rem;padding-bottom:.4rem}
.row{border-radius:var(--radius-md);cursor:pointer;border:1px solid transparent;transition:background .1s,border-color .1s;position:relative}
.row:hover{background:var(--gray-50)}
.row.selected{background:var(--azure-50);border-color:var(--azure-500)}
.row .col{font-weight:600;color:var(--gray-900);font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.status{font-size:1.05rem;text-align:center}

/* Combobox */
.combo-wrap{position:relative}
.combo{display:flex;align-items:center;justify-content:space-between;width:100%;padding:.5rem .7rem;border:1px solid var(--gray-300);border-radius:var(--radius-md);background:var(--white);font-size:.85rem;color:var(--gray-700);cursor:pointer;font-family:var(--mono);overflow:hidden}
.combo .placeholder{color:var(--gray-400);font-style:italic;font-family:var(--font)}
.combo .nm-text{font-style:italic;font-family:var(--font);color:var(--gray-600)}
.combo:hover{border-color:var(--gray-400)}
.combo .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.combo::after{content:"▾";color:var(--gray-400);margin-left:.5rem;flex-shrink:0;font-size:.7rem}

/* Dropdown — wider than the combobox, with per-option descriptions */
.dropdown{position:absolute;top:calc(100% + 4px);left:0;width:540px;max-width:90vw;background:var(--white);border:1px solid var(--gray-300);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);z-index:50;max-height:440px;display:flex;flex-direction:column;overflow:hidden}
.dropdown.hidden{display:none}
.dropdown.flip-right{left:auto;right:0}
.dd-search{padding:.55rem .8rem;border-bottom:1px solid var(--gray-100)}
.dd-search input{width:100%;padding:.4rem .6rem .4rem 1.9rem;font-size:.82rem;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m20 20-3-3'/></svg>") no-repeat .55rem center;background-size:13px 13px;font-family:var(--font)}
.dd-search input:focus{outline:none;border-color:var(--azure-500)}
.dd-list{overflow-y:auto;flex:1;padding:.25rem 0}

.dd-opt{padding:.55rem .85rem;cursor:pointer;border-left:3px solid transparent}
.dd-opt:hover{background:var(--gray-50)}
.dd-opt.ai{background:var(--netrias-50);border-left-color:var(--netrias-500)}
.dd-opt.ai:hover{background:var(--netrias-100)}
.dd-opt.none{border-left-color:var(--gray-300)}
.dd-row{display:flex;align-items:center;gap:.5rem;min-width:0}
.dd-opt .name{font-family:var(--mono);color:var(--gray-900);font-size:.86rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;min-width:0}
.dd-opt.none .name{font-family:var(--font);font-style:italic;color:var(--gray-700)}
.ai-badge{font-size:.66rem;background:var(--netrias-100);color:var(--netrias-700);padding:.1rem .45rem;border-radius:var(--radius-sm);font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;display:inline-flex;align-items:center;gap:.25rem}
.dd-opt .count{color:var(--gray-500);font-variant-numeric:tabular-nums;font-size:.76rem;flex-shrink:0;margin-left:auto;cursor:help}
.dd-opt .count b{color:var(--gray-900);font-weight:600}
.dd-opt .count.high b{color:var(--netrias-700)}
.dd-opt .count.zero{color:var(--gray-300)}
.dd-desc{font-size:.76rem;color:var(--gray-500);margin-top:.2rem;line-height:1.4;padding-left:.05rem}
.dd-divider{height:1px;background:var(--gray-100);margin:.3rem 0}
.dd-empty{padding:1.2rem;text-align:center;color:var(--gray-500);font-size:.82rem}

/* Sidebar */
.side{position:sticky;top:1rem;background:var(--white);border-radius:var(--radius-2xl);box-shadow:var(--shadow-lg);height:calc(100vh - 2rem);display:flex;flex-direction:column;overflow:hidden}
.side-head{padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--gray-100);flex-shrink:0}
.side-eyebrow{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);font-weight:600;margin-bottom:.2rem}
.side-col{font-size:1.1rem;font-weight:700;color:var(--gray-900);font-family:var(--mono);word-break:break-all;line-height:1.3}

.side-body{flex:1;display:flex;flex-direction:column;min-height:0}
.section{display:flex;flex-direction:column;min-height:0;border-bottom:1px solid var(--gray-100);transition:flex .2s ease;position:relative}
.section:last-child{border-bottom:none}
.focus-toggle.floating{position:absolute;top:.5rem;right:.7rem;z-index:5;background:var(--white);box-shadow:var(--shadow-sm)}
.sec-data .section-body{padding-top:.85rem}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.25rem .55rem;flex-shrink:0;gap:.5rem}
.section-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);font-weight:600;display:flex;align-items:center;gap:.5rem;flex:1;min-width:0}
.section-label .name{color:var(--gray-900);text-transform:none;letter-spacing:0;font-family:var(--mono);font-weight:700;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.focus-toggle{background:none;border:1px solid transparent;border-radius:var(--radius-sm);padding:.15rem .35rem;color:var(--gray-400);cursor:pointer;font-size:.85rem;line-height:1;flex-shrink:0}
.focus-toggle:hover{color:var(--gray-700);background:var(--gray-100)}
.section-body{padding:0 1.25rem 1rem;overflow-y:auto;flex:1;min-height:0;display:flex;flex-direction:column}

/* Default balanced split: target gets more room than data (PVs are usually the bigger task) */
.side[data-focus="balanced"] .sec-data{flex:1 1 0}
.side[data-focus="balanced"] .sec-target{flex:1.6 1 0}
.side[data-focus="data"] .sec-data{flex:1 1 0}
.side[data-focus="data"] .sec-target{flex:0 0 auto}
.side[data-focus="data"] .sec-target .section-body{display:none}
.side[data-focus="target"] .sec-target{flex:1 1 0}
.side[data-focus="target"] .sec-data{flex:0 0 auto}
.side[data-focus="target"] .sec-data .section-body{display:none}

/* Your Data */
.metrics{font-size:.78rem;color:var(--gray-600);margin-bottom:.55rem;flex-shrink:0}
.metrics b{color:var(--gray-900);font-weight:600}
.samples{margin:0;padding:0;list-style:none}
.samples li{display:grid;grid-template-columns:14px minmax(0,1fr) auto;gap:.55rem;align-items:center;padding:.28rem 0;font-size:.85rem;border-bottom:1px dashed var(--gray-100)}
.samples li:last-child{border-bottom:none}
.samples .ok{color:var(--netrias-600);font-weight:700;font-size:.82rem;text-align:center;cursor:help}
.samples .v{color:var(--gray-700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:.82rem}
.samples .c{color:var(--gray-500);font-variant-numeric:tabular-nums;font-size:.76rem}
.tail-summary{margin-top:.55rem;padding:.5rem .65rem;font-size:.76rem;color:var(--gray-600);background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--radius-sm);line-height:1.4;flex-shrink:0}
.tail-summary b{color:var(--gray-900)}
.show-more{font-size:.76rem;color:var(--azure-500);margin-top:.5rem;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;align-self:flex-start;flex-shrink:0}
.show-more:hover{text-decoration:underline}
.unique-msg{padding:.55rem .7rem;font-size:.8rem;color:var(--gray-700);background:var(--azure-50);border:1px solid var(--azure-100);border-radius:var(--radius-sm);margin-bottom:.5rem;line-height:1.45;flex-shrink:0}
.unique-msg b{color:var(--gray-900)}

/* Target — consolidated info block (description + note) */
.cde-info{background:var(--gray-50);border-radius:var(--radius-sm);padding:.55rem .7rem;margin-bottom:.6rem;font-size:.82rem;line-height:1.5;color:var(--gray-700);flex-shrink:0}
.cde-info p{margin:0}
.cde-info .cde-note{color:var(--gray-500);font-size:.77rem;margin-top:.3rem}
.target-empty{padding:1.2rem 0;text-align:center;color:var(--gray-500);font-size:.82rem;line-height:1.5}

/* PV header: search left, count right */
.pv-head{display:flex;justify-content:space-between;align-items:center;gap:.6rem;margin-bottom:.5rem;flex-shrink:0}
.pv-search-wrap{flex:1;min-width:0;max-width:240px}
.pv-search{width:100%;padding:.35rem .55rem .35rem 1.85rem;font-size:.8rem;border:1px solid var(--gray-300);border-radius:var(--radius-sm);background:var(--white) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m20 20-3-3'/></svg>") no-repeat .5rem center;background-size:13px 13px;font-family:var(--font)}
.pv-search:focus{outline:none;border-color:var(--azure-500);box-shadow:0 0 0 2px var(--azure-50)}
.pv-count{font-size:.76rem;color:var(--gray-500);font-variant-numeric:tabular-nums;flex-shrink:0}
.pv-count b{color:var(--gray-900);font-weight:700}
.pv-list{overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--gray-50);min-height:180px;flex:1 1 auto}
.pv-list ul{list-style:none;margin:0;padding:0}
.pv-list li{padding:.32rem .7rem;font-size:.82rem;color:var(--gray-700);border-bottom:1px solid var(--gray-200);font-family:var(--mono);content-visibility:auto;contain-intrinsic-size:auto 28px}
.pv-list li:last-child{border-bottom:none}
.pv-list li.match{background:var(--netrias-50);color:var(--netrias-700)}
.pv-list li.match::before{content:"\2713\00a0";color:var(--netrias-600);font-weight:700}

.side-empty{padding:3rem 1.5rem;text-align:center;color:var(--gray-500);font-size:.88rem}
</style>
</head>
<body>

<nav class="tracker">
  <ol>
    <li class="step complete"><span class="idx">✓</span><span>Upload</span></li>
    <li class="conn complete"></li>
    <li class="step active"><span class="idx">2</span><span>Map</span></li>
    <li class="conn"></li>
    <li class="step"><span class="idx">3</span><span>Harmonize</span></li>
    <li class="conn"></li>
    <li class="step"><span class="idx">4</span><span>Verify</span></li>
    <li class="conn"></li>
    <li class="step"><span class="idx">5</span><span>Review</span></li>
  </ol>
  <button class="harm-btn">Harmonize →</button>
</nav>

<main class="shell">
  <section class="card">
    <div class="toolbar">
      <div class="chips" id="filterChips"></div>
      <input type="search" class="col-search" id="colSearch" placeholder="Filter columns…" />
    </div>

    <div class="legend">
      <div class="item"><span class="ico ico--rec">✦</span><span>Use AI recommendation</span></div>
      <div class="item"><span class="ico ico--ovr">✎</span><span>Manual override</span></div>
      <div class="item"><span class="ico ico--none">○</span><span>No mapping</span></div>
    </div>

    <div class="tbl">
      <div class="tbl-head">
        <div></div>
        <div>Your column</div>
        <div>Mapping</div>
      </div>
      <div id="rows"></div>
    </div>
  </section>

  <aside class="side" id="side" data-focus="balanced"></aside>
</main>

<script src="data.js"></script>
<script>
const STATUS = { rec: "✦", ovr: "✎", none: "○" };
const STATUS_CLASS = { rec: "ico--rec", ovr: "ico--ovr", none: "ico--none" };
const NO_MAP = "__none__";
const MATCH_TIP = "Distinct values in your column that exactly match a permissible value of this CDE.";
const CONFORM_TIP = "Conformant — value already matches a permissible value of the target CDE.";
const NO_MAP_DESC = "Skip this column. Values will not be harmonized to any standard.";

const data = window.mockData;
const cdeByKey = new Map(data.cde_catalog.map(c => [c.key, c]));
const noteByKey = data.cde_notes;
const pvsByKey = data.cde_pvs;

const state = {
  selectedKey: null,
  filterStatus: "all",
  filterText: "",
  showAllSamples: false,
  openDropdown: null,
  overrides: new Map(), // colKey -> cdeKey or "__none__"
};

/* ─── Effective state helpers ──────────────────────────────── */
function effectiveStatus(col) {
  if (state.overrides.has(col.key)) {
    return state.overrides.get(col.key) === NO_MAP ? "none" : "ovr";
  }
  return col.status;
}
function effectiveCde(col) {
  if (state.overrides.has(col.key)) {
    const v = state.overrides.get(col.key);
    return v === NO_MAP ? null : v;
  }
  return col.override_cde || col.ai_cde;
}

/* ─── Filter chips ─────────────────────────────────────────── */
const filterChips = document.getElementById("filterChips");
function renderChips() {
  const counts = { all: data.columns.length, rec: 0, ovr: 0, none: 0 };
  for (const c of data.columns) counts[effectiveStatus(c)]++;
  const items = [
    { key: "all", label: "All", icon: null },
    { key: "rec", label: "AI rec", icon: "✦", cls: "ico--rec" },
    { key: "ovr", label: "Override", icon: "✎", cls: "ico--ovr" },
    { key: "none", label: "No mapping", icon: "○", cls: "ico--none" },
  ];
  filterChips.innerHTML = items.map(it => `
    <button class="chip ${state.filterStatus === it.key ? "active" : ""}" data-key="${it.key}">
      ${it.icon ? `<span class="ico ${it.cls}">${it.icon}</span>` : ""}
      <span>${it.label}</span>
      <span class="count">${counts[it.key]}</span>
    </button>
  `).join("");
}
filterChips.addEventListener("click", e => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  state.filterStatus = btn.dataset.key;
  renderChips();
  renderRows();
});

/* ─── Column search ────────────────────────────────────────── */
document.getElementById("colSearch").addEventListener("input", e => {
  state.filterText = e.target.value.toLowerCase();
  renderRows();
});

/* ─── Table rows ───────────────────────────────────────────── */
const rowsEl = document.getElementById("rows");
function renderRows() {
  const filtered = data.columns.filter(c => {
    if (state.filterStatus !== "all" && effectiveStatus(c) !== state.filterStatus) return false;
    if (state.filterText && !c.header.toLowerCase().includes(state.filterText)) return false;
    return true;
  });
  rowsEl.innerHTML = filtered.map(rowHtml).join("");
  if (filtered.length && !filtered.find(c => c.key === state.selectedKey)) {
    selectRow(filtered[0].key);
  } else if (state.selectedKey) {
    selectRow(state.selectedKey);
  }
}
function rowHtml(col) {
  const status = effectiveStatus(col);
  const override = state.overrides.get(col.key);
  // Combobox display: current effective CDE name, or "No Mapping" italic, or empty placeholder
  let comboInner;
  if (override === NO_MAP) {
    comboInner = `<span class="nm-text">No Mapping</span>`;
  } else {
    const cde = effectiveCde(col);
    if (cde) {
      comboInner = `<span class="label" title="${escapeAttr(cde)}">${escapeHtml(cde)}</span>`;
    } else {
      comboInner = `<span class="placeholder">Select a CDE…</span>`;
    }
  }
  return `
    <div class="row${state.selectedKey === col.key ? " selected" : ""}" data-key="${col.key}">
      <div class="status ${STATUS_CLASS[status]}" title="${status}">${STATUS[status]}</div>
      <div class="col" title="${escapeAttr(col.header)}">${escapeHtml(col.header)}</div>
      <div class="combo-wrap">
        <div class="combo" data-action="open-dropdown" data-key="${col.key}">${comboInner}</div>
      </div>
    </div>
  `;
}
rowsEl.addEventListener("click", e => {
  if (e.target.closest("[data-action='open-dropdown']")) {
    const key = e.target.closest("[data-action='open-dropdown']").dataset.key;
    e.stopPropagation();
    toggleDropdown(key);
    return;
  }
  const row = e.target.closest(".row");
  if (row) selectRow(row.dataset.key);
});

/* ─── Dropdown ─────────────────────────────────────────────── */
function toggleDropdown(colKey) {
  if (state.openDropdown === colKey) { closeDropdown(); return; }
  closeDropdown();
  const col = data.columns.find(c => c.key === colKey);
  if (!col) return;

  const aiKey = col.ai_cde;
  const opts = data.cde_catalog
    .map(c => ({ ...c, matches: col.match_counts[c.key] || 0 }))
    .filter(c => c.key !== aiKey)
    .sort((a, b) => b.matches - a.matches || a.label.localeCompare(b.label));
  const aiOption = aiKey ? { ...cdeByKey.get(aiKey), matches: col.match_counts[aiKey] || 0 } : null;

  const wrap = rowsEl.querySelector(`.row[data-key="${colKey}"] .combo-wrap`);
  if (!wrap) return;
  const dd = document.createElement("div");
  dd.className = "dropdown";
  dd.innerHTML = `
    <div class="dd-search"><input type="search" placeholder="Filter CDEs by name or description…" id="ddSearch" autocomplete="off" /></div>
    <div class="dd-list" id="ddList">${renderDropdownItems(col, aiOption, opts, "")}</div>
  `;
  wrap.appendChild(dd);
  state.openDropdown = colKey;

  // Flip dropdown to right edge if it would overflow viewport
  const rect = dd.getBoundingClientRect();
  if (rect.right > window.innerWidth - 12) dd.classList.add("flip-right");

  setTimeout(() => dd.querySelector("input").focus(), 0);
  dd.querySelector("input").addEventListener("input", e => {
    document.getElementById("ddList").innerHTML = renderDropdownItems(col, aiOption, opts, e.target.value);
  });
  dd.addEventListener("click", e => {
    const opt = e.target.closest(".dd-opt");
    if (!opt) return;
    pickOverride(colKey, opt.dataset.value);
    closeDropdown();
  });
}

function renderDropdownItems(col, aiOption, opts, q) {
  const lq = q.toLowerCase();
  const matches = c => !lq
    || (c.label || c.key).toLowerCase().includes(lq)
    || (c.description || "").toLowerCase().includes(lq);

  const sections = [];
  if (aiOption && matches(aiOption)) sections.push(optHtml(aiOption, "ai"));
  if (!q) {
    sections.push(optHtml({
      key: NO_MAP,
      label: "No Mapping",
      description: NO_MAP_DESC,
    }, "none"));
  }
  if (sections.length) sections.push(`<div class="dd-divider"></div>`);

  const others = opts.filter(matches);
  others.forEach(o => sections.push(optHtml(o, "alt")));

  if (!sections.length || (others.length === 0 && !aiOption && q)) {
    return `<div class="dd-empty">No CDEs match "${escapeHtml(q)}"</div>`;
  }
  return sections.join("");
}

function optHtml(c, kind) {
  const showMatch = kind !== "none";
  const matchHtml = showMatch ? `
    <span class="count ${c.matches > 0 ? "high" : "zero"}" title="${MATCH_TIP}">
      ${c.matches > 0 ? `<b>${c.matches.toLocaleString()}</b> matches` : "0 matches"}
    </span>` : "";
  const badge = kind === "ai" ? `<span class="ai-badge">✦ AI rec</span>` : "";
  const desc = c.description ? `<div class="dd-desc">${escapeHtml(c.description)}</div>` : "";
  return `
    <div class="dd-opt ${kind}" data-value="${c.key}">
      <div class="dd-row">
        <span class="name" title="${escapeAttr(c.label || c.key)}">${escapeHtml(c.label || c.key)}</span>
        ${badge}
        ${matchHtml}
      </div>
      ${desc}
    </div>
  `;
}

function pickOverride(colKey, value) {
  const col = data.columns.find(c => c.key === colKey);
  if (col.ai_cde && value === col.ai_cde) {
    state.overrides.delete(colKey); // selecting the AI rec = revert to AI mode
  } else {
    state.overrides.set(colKey, value);
  }
  renderChips();
  renderRows();
}

function closeDropdown() {
  if (!state.openDropdown) return;
  const dd = rowsEl.querySelector(".dropdown");
  if (dd) dd.remove();
  state.openDropdown = null;
}
document.addEventListener("click", e => {
  if (!e.target.closest(".dropdown") && !e.target.closest("[data-action='open-dropdown']")) {
    closeDropdown();
  }
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDropdown(); });

/* ─── Sidebar ──────────────────────────────────────────────── */
const sideEl = document.getElementById("side");

function selectRow(key) {
  state.selectedKey = key;
  state.showAllSamples = false;
  document.querySelectorAll(".row").forEach(r => r.classList.toggle("selected", r.dataset.key === key));
  const col = data.columns.find(c => c.key === key);
  if (!col) {
    sideEl.innerHTML = `<div class="side-empty">No column selected.</div>`;
    return;
  }
  renderSidebar(col);
}

function renderSidebar(col) {
  const cde = effectiveCde(col);
  sideEl.innerHTML = `
    <div class="side-head">
      <div class="side-col" title="${escapeAttr(col.header)}">${escapeHtml(col.header)}</div>
    </div>
    <div class="side-body">
      <div class="section sec-data">
        <button class="focus-toggle floating" data-focus="data" title="Focus this section">⤢</button>
        <div class="section-body">${renderYourData(col)}</div>
      </div>
      <div class="section sec-target">
        <div class="section-head">
          <div class="section-label">Target ${cde ? `· <span class="name" title="${escapeAttr(cde)}">${escapeHtml(cde)}</span>` : ""}</div>
          <button class="focus-toggle" data-focus="target" title="Focus this section">⤢</button>
        </div>
        <div class="section-body">${renderTarget(col, cde)}</div>
      </div>
    </div>
  `;
  bindSidebarEvents(col);
}

function renderYourData(col) {
  const totalDistinct = col.distinct;
  const samples = col.samples;
  const tail = col.tail;

  if (col.all_unique) {
    return `
      <div class="unique-msg">
        <b>All ${totalDistinct.toLocaleString()} values are unique</b> — likely an identifier or date. Mapping is rarely useful for these.
      </div>
      <ul class="samples">${samples.slice(0, 5).map(sampleHtml).join("")}</ul>
    `;
  }
  if (totalDistinct < 50) {
    return `<ul class="samples">${samples.map(sampleHtml).join("")}</ul>`;
  }
  if (totalDistinct < 500) {
    const visible = state.showAllSamples ? samples : samples.slice(0, 20);
    return `<ul class="samples">${visible.map(sampleHtml).join("")}</ul>`
      + (state.showAllSamples
          ? `<button class="show-more" id="showFewer">Show top 20</button>`
          : `<button class="show-more" id="showAll">Show all ${totalDistinct} values</button>`);
  }
  // High cardinality: top 20 + tail summary
  const topVisible = state.showAllSamples ? samples : samples.slice(0, 20);
  const tailLine = tail ? `
    <div class="tail-summary">
      + <b>${tail.distinct_values.toLocaleString()}</b> more values
      across <b>${tail.rows_total.toLocaleString()}</b> rows ·
      <b>${tail.appearing_once.toLocaleString()}</b> appear once
    </div>
  ` : "";
  const moreBtn = state.showAllSamples
    ? `<button class="show-more" id="showFewer">Show top 20</button>`
    : `<button class="show-more" id="showAll">Show top ${samples.length}</button>`;
  return `<ul class="samples">${topVisible.map(sampleHtml).join("")}</ul>`
    + moreBtn
    + tailLine;
}

function sampleHtml(s) {
  const ok = s.match
    ? `<span class="ok" title="${CONFORM_TIP}">✓</span>`
    : `<span class="ok"></span>`;
  return `<li>${ok}<span class="v" title="${escapeAttr(s.v)}">${escapeHtml(s.v)}</span><span class="c">${s.c.toLocaleString()}</span></li>`;
}

function renderTarget(col, cde) {
  if (!cde) {
    return `<div class="target-empty">No target selected.<br/>Choose a CDE in the row's mapping dropdown to see permissible values.</div>`;
  }
  const meta = cdeByKey.get(cde);
  const desc = meta ? meta.description : "";
  const note = noteByKey[cde];
  const pvs = pvsByKey[cde] || [];
  const sampleValues = new Set(col.samples.map(s => s.v));
  const showSearch = pvs.length > 50;
  const infoHtml = (desc || note) ? `
    <div class="cde-info">
      ${desc ? `<p>${escapeHtml(desc)}</p>` : ""}
      ${note ? `<p class="cde-note">${escapeHtml(note)}</p>` : ""}
    </div>
  ` : "";
  return `
    ${infoHtml}
    <div class="pv-head">
      <div class="pv-search-wrap">
        ${showSearch ? `<input type="search" class="pv-search" id="pvSearch" placeholder="Search values…" autocomplete="off" />` : ""}
      </div>
      <div class="pv-count"><b>${pvs.length.toLocaleString()}</b> permissible values</div>
    </div>
    <div class="pv-list" id="pvList"><ul>${renderPvItems(pvs, sampleValues, "")}</ul></div>
  `;
}

function renderPvItems(pvs, sampleValues, q) {
  const lq = q.toLowerCase();
  const filtered = q ? pvs.filter(p => p.toLowerCase().includes(lq)) : pvs;
  if (!filtered.length) return `<li class="dd-empty">No matches for "${escapeHtml(q)}"</li>`;
  return filtered.map(p => `<li class="${sampleValues.has(p) ? "match" : ""}">${escapeHtml(p)}</li>`).join("");
}

function bindSidebarEvents(col) {
  sideEl.querySelectorAll(".focus-toggle").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const want = btn.dataset.focus;
      sideEl.dataset.focus = sideEl.dataset.focus === want ? "balanced" : want;
    });
  });
  const showAll = document.getElementById("showAll");
  if (showAll) showAll.addEventListener("click", () => { state.showAllSamples = true; renderSidebar(col); });
  const showFewer = document.getElementById("showFewer");
  if (showFewer) showFewer.addEventListener("click", () => { state.showAllSamples = false; renderSidebar(col); });
  const pvSearch = document.getElementById("pvSearch");
  if (pvSearch) {
    const cde = effectiveCde(col);
    const pvs = cde ? pvsByKey[cde] : [];
    const sampleValues = new Set(col.samples.map(s => s.v));
    pvSearch.addEventListener("input", e => {
      document.getElementById("pvList").innerHTML = `<ul>${renderPvItems(pvs, sampleValues, e.target.value)}</ul>`;
    });
  }
}

/* ─── Utils ────────────────────────────────────────────────── */
function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
function escapeAttr(s) {
  return String(s).replace(/["'&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ─── Boot ─────────────────────────────────────────────────── */
renderChips();
renderRows();
selectRow(data.columns[0].key);
</script>
</body>
