<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Chord · Harmonize</title>
    <link rel="stylesheet" href="/assets/shared/tokens.css" />
    <link rel="stylesheet" href="{{ request.url_for('stage_three_static', path='stage_3_harmonize.css') }}" />
    <!-- Animation CSS loaded separately - page works without it -->
    <link rel="stylesheet" href="{{ request.url_for('stage_three_static', path='harmonize-animation.css') }}" />
  </head>
  <body>
    <nav class="progress-tracker">
      <div class="progress-tracker-row">
        <ol class="progress-track">
          <li class="step complete" data-stage="upload" data-url="{{ request.url_for('stage_one_upload_page') }}">
            <span class="step-index">1</span>
            <span class="step-label">Upload</span>
          </li>
          <li class="connector complete"></li>
          <li class="step complete" data-stage="mapping" data-url="{{ request.url_for('stage_two_mapping_page') }}">
            <span class="step-index">2</span>
            <span class="step-label">Map</span>
          </li>
          <li class="connector complete"></li>
          <li class="step active" data-stage="harmonize" data-url="{{ request.url_for('stage_three_entry') }}">
            <span class="step-index">3</span>
            <span class="step-label">Harmonize</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="verify" data-url="{{ request.url_for('stage_four_review_page') }}">
            <span class="step-index">4</span>
            <span class="step-label">Verify</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="review" data-url="{{ request.url_for('stage_five_review_page') }}">
            <span class="step-index">5</span>
            <span class="step-label">Review</span>
          </li>
        </ol>
        <div class="progress-tracker-action">
          <button id="reviewButton" class="btn-3d" type="button" disabled>
            <span class="btn-3d-shadow" aria-hidden="true"></span>
            <span class="btn-3d-edge" aria-hidden="true"></span>
            <span class="btn-3d-front">Verify →</span>
          </button>
        </div>
      </div>
      <div id="stepInstruction" class="step-instruction">
        <p class="step-instruction-text"></p>
        <span class="step-instruction-tooltip" aria-hidden="true"></span>
      </div>
    </nav>

    <main class="stage-shell">
      <section id="stageThreeMetrics" class="stage-card progress-card">
        <header class="stage-section-header">
          <h2 id="stageThreeTitle" class="stage-title">Harmonizing</h2>
          <p id="jobIdDisplay" class="stage-job-id hidden"></p>
        </header>

        <div id="stageThreeEmptyState" class="stage-empty hidden">
          <p class="stage-empty-title">We need mapping context</p>
          <p class="stage-empty-copy">
            Head back to Stage 2 to confirm mappings, then launch harmonization again.
          </p>
          <button id="returnToStageTwo" class="netrias-btn" type="button">Back to mappings</button>
        </div>

        <div id="loadingState" class="loading-state" aria-live="assertive">
          <!-- Fallback spinner - hidden when animation loads successfully -->
          <div class="loading-spinner loading-spinner--fallback" aria-hidden="true"></div>
          <!-- Main animation - purely decorative, page works without it -->
          <div class="harmonize-animation" role="presentation" aria-hidden="true">
            <div class="transform-line">
              <div class="transform-line__glow"></div>
              <div class="plasma-tube">
                <div class="plasma-tube__outer"></div>
                <div class="plasma-tube__inner"></div>
              </div>
              <div class="ripple ripple--1"></div>
              <div class="ripple ripple--2"></div>
              <div class="ripple ripple--3"></div>
            </div>
            <div class="block block--1"></div>
            <div class="block block--2"></div>
            <div class="block block--3"></div>
            <div class="block block--4"></div>
            <div class="block block--5"></div>
          </div>
          <p class="loading-message loading-message--primary">Netrias is harmonizing your dataset</p>
          <p class="loading-message loading-message--secondary">This usually takes 1-2 minutes.</p>
        </div>

        <div class="metrics-grid hidden" data-metrics-grid aria-live="polite"></div>

        <p id="stageThreeError" class="stage-error hidden" role="alert"></p>

        <div class="progress-actions">
          <button id="retryButton" class="ghost-btn hidden" type="button">Retry</button>
        </div>
      </section>
    </main>

    <script>
      window.stageThreeConfig = {
        harmonizeEndpoint: "{{ request.url_for('stage_three_harmonize') }}",
        nextStageUrl: "{{ next_stage_url }}",
        stageTwoUrl: "{{ request.url_for('stage_two_mapping_page') }}",
      };
    </script>
    <script type="module" src="{{ request.url_for('stage_three_static', path='stage_3_harmonize.js') }}"></script>
  </body>
</html>
