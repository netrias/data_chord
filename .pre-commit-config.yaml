repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.2
    hooks:
      - id: ruff-format
        args: [src/, tests/]
      - id: ruff
        args: [--fix, src/, tests/]

  - repo: local
    hooks:
      - id: no-cross-stage-imports
        name: no cross-stage imports
        description: "Stages must depend on domain, not on each other"
        entry: bash -c 'found=0; for file in src/stage_*/*.py src/stage_*/**/*.py 2>/dev/null; do [ -f "$file" ] || continue; source_stage=$(echo "$file" | grep -oE "stage_[0-9]" | head -1); grep -n "from src\.stage_" "$file" 2>/dev/null | while read line; do import_stage=$(echo "$line" | grep -oE "stage_[0-9]" | tail -1); if [ "$source_stage" != "$import_stage" ]; then echo "ERROR: $file imports from different stage: $line"; exit 1; fi; done || exit 1; done'
        language: system
        pass_filenames: false
        types: [python]
