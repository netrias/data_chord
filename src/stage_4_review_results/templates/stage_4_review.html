<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Chord · Review Harmonization</title>
    <link rel="stylesheet" href="/assets/shared/tokens.css" />
    <link rel="stylesheet" href="{{ request.url_for('stage_one_static', path='stage_1_upload.css') }}" />
    <link rel="stylesheet" href="{{ request.url_for('stage_four_static', path='stage_4_review.css') }}" />
  </head>
  <body>
    <nav class="progress-tracker">
      <div class="progress-tracker-row">
        <ol class="progress-track">
          <li class="step complete" data-stage="upload" data-url="{{ request.url_for('stage_one_upload_page') }}">
            <span class="step-index">1</span>
            <span class="step-label">Upload</span>
          </li>
          <li class="connector complete"></li>
          <li class="step complete" data-stage="mapping" data-url="{{ request.url_for('stage_two_mapping_page') }}">
            <span class="step-index">2</span>
            <span class="step-label">Map</span>
          </li>
          <li class="connector complete"></li>
          <li class="step complete" data-stage="harmonize" data-url="{{ request.url_for('stage_three_entry') }}">
            <span class="step-index">3</span>
            <span class="step-label">Harmonize</span>
          </li>
          <li class="connector complete"></li>
          <li class="step active" data-stage="verify" data-url="{{ request.url_for('stage_four_review_page') }}">
            <span class="step-index">4</span>
            <span class="step-label">Verify</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="review" data-url="{{ request.url_for('stage_five_review_page') }}">
            <span class="step-index">5</span>
            <span class="step-label">Review</span>
          </li>
        </ol>
        <div class="progress-tracker-action">
          <button id="stageFiveButton" class="btn-3d" type="button">
            <span class="btn-3d-shadow" aria-hidden="true"></span>
            <span class="btn-3d-edge" aria-hidden="true"></span>
            <span class="btn-3d-front">Review →</span>
          </button>
        </div>
      </div>
      <div id="stepInstruction" class="step-instruction">
        <p class="step-instruction-text"></p>
        <span class="step-instruction-tooltip" aria-hidden="true"></span>
      </div>
    </nav>

    <main class="stage-shell stage-four-shell">
      <section class="batch-progress-panel">
        <div id="batchProgressList" class="batch-progress-list" role="list" aria-live="polite"></div>
        <button id="settingsButton" class="settings-btn" type="button" aria-label="Open settings">
          <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span>Settings</span>
        </button>

        <!-- Settings Modal -->
        <dialog id="settingsModal" class="settings-modal">
          <div class="settings-modal-content">
            <div class="settings-modal-header">
              <h2 class="settings-modal-title">Review Settings</h2>
            </div>
            <div class="settings-modal-body">
              <div class="control-group">
                <label for="reviewModeSelect">Review by</label>
                <select id="reviewModeSelect">
                  <option value="column">Column</option>
                  <option value="row">Row</option>
                </select>
              </div>
              <div class="control-group">
                <label for="sortModeSelect">Sort by</label>
                <select id="sortModeSelect">
                  <option value="original" selected>Original order</option>
                  <option value="confidence-asc">Confidence · Lowest first</option>
                  <option value="confidence-desc">Confidence · Highest first</option>
                </select>
              </div>
              <div class="control-group">
                <label for="batchSizeSelect">Grid size</label>
                <select id="batchSizeSelect">
                  <!-- Options populated dynamically based on review mode -->
                </select>
              </div>
              <div class="control-group control-group--checkbox">
                <label class="checkbox-label">
                  <input type="checkbox" id="hideCaseOnlyChanges" checked />
                  <span class="checkbox-text">Hide case-only changes</span>
                </label>
              </div>
            </div>
            <div class="settings-modal-footer">
              <button id="settingsCloseButton" class="netrias-btn" type="button">Close</button>
            </div>
          </div>
        </dialog>
      </section>

      <section class="stage-card review-grid">
        <div class="review-toolbar">
          <div class="conformance-legend">
            <div class="legend-item legend-item--conformant">
              <span class="legend-icon" aria-hidden="true">✓</span>
              <span class="legend-label">Value matches approved term</span>
            </div>
            <div class="legend-item legend-item--non-conformant">
              <span class="legend-icon" aria-hidden="true">⚠</span>
              <span class="legend-label">Value not in approved terms</span>
            </div>
          </div>
          <div class="batch-actions">
            <button id="previousBatchButton" class="ghost-btn" type="button">← Previous</button>
            <button id="nextBatchButton" class="ghost-btn" type="button">Next →</button>
          </div>
        </div>
        <div id="reviewTable" class="review-table" role="table" aria-live="polite"></div>
      </section>
    </main>

    <script>
      window.stageFourConfig = {
        stageFiveUrl: "{{ request.url_for('stage_five_review_page') }}",
        resultsEndpoint: "{{ results_endpoint }}",
      };
    </script>
    <!-- Clusterize.js for virtualized table rendering in row context popup -->
    <script src="https://cdn.jsdelivr.net/npm/clusterize.js@0.19.0/clusterize.min.js"></script>
    <script type="module" src="{{ request.url_for('stage_four_static', path='stage_4_review.js') }}"></script>
  </body>
</html>
