<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Chord · Mapping</title>
    <link rel="stylesheet" href="/assets/shared/tokens.css" />
    <link rel="stylesheet" href="{{ request.url_for('stage_one_static', path='stage_1_upload.css') }}" />
    <link rel="stylesheet" href="{{ request.url_for('stage_two_static', path='stage_2_mappings.css') }}" />
  </head>
  <body>
    <nav class="progress-tracker">
      <div class="progress-tracker-row">
        <ol class="progress-track">
          <li class="step complete" data-stage="upload" data-url="{{ request.url_for('stage_one_upload_page') }}">
            <span class="step-index">1</span>
            <span class="step-label">Upload</span>
          </li>
          <li class="connector complete"></li>
          <li class="step active" data-stage="mapping" data-url="{{ request.url_for('stage_two_mapping_page') }}">
            <span class="step-index">2</span>
            <span class="step-label">Map</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="harmonize" data-url="{{ request.url_for('stage_three_entry') }}">
            <span class="step-index">3</span>
            <span class="step-label">Harmonize</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="verify" data-url="{{ request.url_for('stage_four_review_page') }}">
            <span class="step-index">4</span>
            <span class="step-label">Verify</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="review" data-url="{{ request.url_for('stage_five_review_page') }}">
            <span class="step-index">5</span>
            <span class="step-label">Review</span>
          </li>
        </ol>
        <div class="progress-tracker-action">
          <button id="harmonizeButton" class="btn-3d" type="button" disabled>
            <span class="btn-3d-shadow" aria-hidden="true"></span>
            <span class="btn-3d-edge" aria-hidden="true"></span>
            <span class="btn-3d-front">Harmonize →</span>
          </button>
        </div>
      </div>
      <div id="stepInstruction" class="step-instruction">
        <p class="step-instruction-text"></p>
        <span class="step-instruction-tooltip" aria-hidden="true"></span>
      </div>
    </nav>

    <main class="stage-shell stage-shell--mapping">
      <section class="stage-card mapping-card">
        <aside class="filter-sidebar hidden" id="filterSidebar"></aside>
        <div class="mapping-content">
          <div id="mappingLockBanner" class="mapping-lock-banner hidden" role="status"></div>
          <div class="mapping-toolbar">
            <div class="mapping-filter-bar" id="sourceFilter"></div>
            <input type="search" class="mapping-col-search" id="colSearch" placeholder="Filter columns…" autocomplete="off" />
          </div>

          <div class="mapping-list">
            <div class="mapping-list-head">
              <button id="columnSortBtn" class="mapping-list-head-sort" type="button" aria-label="Sort by column name">
                <span>Your column</span>
                <span class="mapping-list-head-sort-arrow" aria-hidden="true">⇅</span>
              </button>
              <div></div>
              <button id="targetSortBtn" class="mapping-list-head-sort mapping-list-head-sort--center" type="button" aria-label="Sort by target common data element">
                <span>Target common data element</span>
                <span class="mapping-list-head-sort-arrow" aria-hidden="true">⇅</span>
              </button>
              <button id="valueFitSortBtn" class="mapping-list-head-sort" type="button" aria-label="Sort by value fit">
                <span>Value fit</span>
                <span class="mapping-list-head-sort-arrow" aria-hidden="true">⇅</span>
              </button>
              <div></div>
            </div>
            <div id="mappingRows"></div>
          </div>
          <div id="mappingEmptyState" class="mapping-empty hidden"></div>
        </div>
      </section>
    </main>

    <div class="takeover hidden" id="takeover">
      <div class="takeover-backdrop" data-action="close-takeover"></div>
      <div class="takeover-card" id="takeoverCard"></div>
    </div>

    <script>
      window.stageTwoConfig = {
        analyzeEndpoint: "{{ request.url_for('stage_one_upload_analyze') }}",
        mappingChoicesEndpoint: "{{ request.url_for('stage_two_save_mapping_choices') }}",
        columnDetailBase: "/stage-2/column-detail",
        targetSchema: "{{ default_schema }}",
        targetVersionNumber: {{ default_version_number|tojson }},
        cdeCatalog: {{ cde_catalog | tojson }},
        noMappingLabel: {{ no_mapping_label | tojson }},
        stageThreeUrl: "{{ request.url_for('stage_three_entry') }}",
      };
    </script>
    <script type="module" src="{{ request.url_for('stage_two_static', path='stage_2_mappings.js') }}"></script>
  </body>
</html>
