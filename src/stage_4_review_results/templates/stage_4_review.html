<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Chord · Review Harmonization</title>
    <link rel="stylesheet" href="{{ request.url_for('stage_one_static', path='stage_1_upload.css') }}" />
    <link rel="stylesheet" href="{{ request.url_for('stage_four_static', path='stage_4_review.css') }}" />
  </head>
  <body>
    <nav class="progress-tracker">
      <ol class="progress-track">
        <li class="step complete" data-stage="upload">
          <span class="step-index">1</span>
          <span class="step-label">Upload</span>
        </li>
        <li class="connector complete"></li>
        <li class="step complete" data-stage="mapping">
          <span class="step-index">2</span>
          <span class="step-label">Mappings</span>
        </li>
        <li class="connector complete"></li>
        <li class="step complete" data-stage="harmonize">
          <span class="step-index">3</span>
          <span class="step-label">Harmonize</span>
        </li>
        <li class="connector complete"></li>
        <li class="step active" data-stage="review">
          <span class="step-index">4</span>
          <span class="step-label">Review</span>
        </li>
        <li class="connector"></li>
        <li class="step" data-stage="export">
          <span class="step-index">5</span>
          <span class="step-label">Export</span>
        </li>
      </ol>
    </nav>

    <main class="stage-shell stage-four-shell">
      <section class="batch-progress-panel">
        <div class="batch-progress-heading">
          <p class="batch-progress-title">Batch progress</p>
          <p id="batchProgressHint" class="batch-progress-hint">Awaiting harmonized rows.</p>
        </div>
        <div id="batchProgressList" class="batch-progress-list" role="list" aria-live="polite"></div>
      </section>

      <section class="stage-card review-grid">
        <header class="stage-section-header review-grid-header">
          <div class="review-controls">
            <div class="control-row">
              <div class="control-group">
                <label for="sortModeSelect">Sort batch by</label>
                <select id="sortModeSelect">
                  <option value="confidence-asc">Confidence · Lowest first</option>
                  <option value="confidence-desc">Confidence · Highest first</option>
                  <option value="original">Original order</option>
                </select>
              </div>
              <div class="control-group">
                <label for="batchSizeSelect">Batch size</label>
                <select id="batchSizeSelect">
                  <option value="5">5 rows</option>
                  <option value="10">10 rows</option>
                  <option value="15">15 rows</option>
                </select>
              </div>
            </div>
            <div id="reviewAlerts" class="review-alert hidden" role="status" aria-live="polite"></div>
            <div id="confidenceGuide" class="confidence-guide" aria-live="polite"></div>
          </div>
          <div class="batch-actions">
            <button id="previousBatchButton" class="ghost-btn" type="button">← Previous batch</button>
            <button id="nextBatchButton" class="ghost-btn" type="button">Next batch →</button>
            <button id="completeBatchButton" class="netrias-btn" type="button">Mark batch complete</button>
          </div>
          <p id="currentBatchIndicator" class="current-batch-indicator">Reviewing batch 1 of 1</p>
        </header>
        <div id="reviewTable" class="review-table" role="table" aria-live="polite"></div>
      </section>
    </main>

    <script>
      window.stageFourConfig = {
        defaultSchema: "{{ default_schema }}",
        stageThreePayloadKey: "{{ stage_three_payload_key }}",
        stageThreeJobKey: "{{ stage_three_job_key }}",
        stageTwoUrl: "{{ stage_two_url }}",
        stageThreeUrl: "{{ stage_three_url }}",
      };
    </script>
    <script type="module" src="{{ request.url_for('stage_four_static', path='stage_4_review.js') }}?v=20250216"></script>
  </body>
</html>
