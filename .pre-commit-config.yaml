repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.2
    hooks:
      - id: ruff-format
        args: [src/, tests/]
      - id: ruff
        args: [--fix, src/, tests/]

  - repo: local
    hooks:
      - id: no-cross-stage-imports
        name: no cross-stage imports
        description: "Stages must depend on domain, not on each other"
        entry: ./scripts/check-cross-stage-imports.sh
        language: system
        pass_filenames: false
        types: [python]

      - id: typecheck-js
        name: typecheck javascript
        description: "Check JavaScript files for undefined references"
        entry: bash -c 'output=$(npx tsc --noEmit 2>&1); if echo "$output" | grep -qE "TS2552|TS6133|TS2304"; then echo "$output" | grep -E "TS2552|TS6133|TS2304"; echo ""; echo "TypeScript found undefined references - please fix!"; exit 1; fi; exit 0'
        language: system
        pass_filenames: false
        types: [javascript]
