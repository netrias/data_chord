<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Chord · Review Harmonization</title>
    <link rel="stylesheet" href="/assets/shared/tokens.css" />
    <link rel="stylesheet" href="{{ request.url_for('stage_one_static', path='stage_1_upload.css') }}" />
    <link rel="stylesheet" href="{{ request.url_for('stage_four_static', path='stage_4_review.css') }}" />
  </head>
  <body>
    <nav class="progress-tracker">
      <ol class="progress-track">
        <li class="step complete" data-stage="upload" data-url="{{ request.url_for('stage_one_upload_page') }}">
          <span class="step-index">1</span>
          <span class="step-label">Upload</span>
        </li>
        <li class="connector complete"></li>
        <li class="step complete" data-stage="mapping" data-url="{{ request.url_for('stage_two_mapping_page') }}">
          <span class="step-index">2</span>
          <span class="step-label">Map</span>
        </li>
        <li class="connector complete"></li>
        <li class="step complete" data-stage="harmonize" data-url="{{ request.url_for('stage_three_entry') }}">
          <span class="step-index">3</span>
          <span class="step-label">Harmonize</span>
        </li>
        <li class="connector complete"></li>
        <li class="step active" data-stage="review" data-url="{{ request.url_for('stage_four_review_page') }}">
          <span class="step-index">4</span>
          <span class="step-label">Review</span>
        </li>
        <li class="connector"></li>
        <li class="step" data-stage="export" data-url="{{ request.url_for('stage_five_review_page') }}">
          <span class="step-index">5</span>
          <span class="step-label">Download</span>
        </li>
      </ol>
      <div id="stepInstruction" class="step-instruction">
        <p class="step-instruction-text"></p>
        <span class="step-instruction-tooltip" aria-hidden="true"></span>
      </div>
    </nav>

    <main class="stage-shell stage-four-shell">
      <div class="stage-nav">
        <button class="nav-btn nav-back" type="button" data-nav-target="{{ request.url_for('stage_three_entry') }}">Back</button>
        <button id="stageFiveButton" class="nav-btn nav-forward netrias-btn" type="button">Proceed to download</button>
      </div>
      <section class="batch-progress-panel">
        <div class="batch-progress-heading">
          <div>
            <p class="batch-progress-title">Batch progress</p>
            <p id="batchProgressHint" class="batch-progress-hint">Awaiting harmonized rows.</p>
          </div>
          <div class="batch-controls">
            <div class="control-group">
              <label for="reviewModeSelect">Review by</label>
              <select id="reviewModeSelect">
                <option value="column">Column</option>
                <option value="row">Row</option>
              </select>
            </div>
            <div class="control-group">
              <label for="sortModeSelect">Sort by</label>
              <select id="sortModeSelect">
                <option value="confidence-asc">Confidence · Lowest first</option>
                <option value="confidence-desc">Confidence · Highest first</option>
                <option value="original">Original order</option>
              </select>
            </div>
            <div class="control-group">
              <label for="batchSizeSelect">Grid size</label>
              <select id="batchSizeSelect">
                <!-- Options populated dynamically based on review mode -->
              </select>
            </div>
          </div>
        </div>
        <div id="batchProgressList" class="batch-progress-list" role="list" aria-live="polite"></div>
        <p id="currentBatchIndicator" class="current-batch-indicator">Reviewing batch 1 of 1</p>
      </section>

      <section class="stage-card review-grid">
        <div class="review-toolbar">
          <div class="confidence-legend">
            <div class="legend-item legend-item--high">
              <span class="legend-icon" aria-hidden="true">✓</span>
              <span class="legend-label">High confidence</span>
            </div>
            <div class="legend-item legend-item--medium">
              <span class="legend-icon" aria-hidden="true">~</span>
              <span class="legend-label">Medium confidence</span>
            </div>
            <div class="legend-item legend-item--low">
              <span class="legend-icon" aria-hidden="true">!</span>
              <span class="legend-label">Low confidence</span>
            </div>
          </div>
          <div class="batch-actions">
            <button id="previousBatchButton" class="ghost-btn" type="button">← Previous</button>
            <button id="nextBatchButton" class="ghost-btn" type="button">Next →</button>
            <button id="completeBatchButton" class="netrias-btn" type="button">Mark batch complete</button>
          </div>
        </div>
        <div id="reviewAlerts" class="review-alert hidden" role="status" aria-live="polite"></div>
        <div id="reviewTable" class="review-table" role="table" aria-live="polite"></div>
      </section>
    </main>

    <script>
      window.stageFourConfig = {
        defaultSchema: "{{ default_schema }}",
        stageThreePayloadKey: "{{ stage_three_payload_key }}",
        stageThreeJobKey: "{{ stage_three_job_key }}",
        stageTwoUrl: "{{ stage_two_url }}",
        stageThreeUrl: "{{ stage_three_url }}",
        stageFiveUrl: "{{ request.url_for('stage_five_review_page') }}",
        resultsEndpoint: "{{ results_endpoint }}",
      };
    </script>
    <script type="module" src="{{ request.url_for('stage_four_static', path='stage_4_review.js') }}?v=20251216"></script>
  </body>
</html>
