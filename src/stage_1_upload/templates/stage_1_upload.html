<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Chord · Guided Workflow</title>
    <link rel="stylesheet" href="/assets/shared/tokens.css" />
    <link rel="stylesheet" href="{{ request.url_for('stage_one_static', path='stage_1_upload.css') }}" />
  </head>
  <body>
    <nav class="progress-tracker">
      <div class="progress-tracker-row">
        <ol class="progress-track">
          <li class="step active" data-stage="upload" data-url="{{ request.url_for('stage_one_upload_page') }}">
            <span class="step-index">1</span>
            <span class="step-label">Upload</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="mapping" data-url="{{ request.url_for('stage_two_mapping_page') }}">
            <span class="step-index">2</span>
            <span class="step-label">Map</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="harmonize" data-url="{{ request.url_for('stage_three_entry') }}">
            <span class="step-index">3</span>
            <span class="step-label">Harmonize</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="verify" data-url="{{ request.url_for('stage_four_review_page') }}">
            <span class="step-index">4</span>
            <span class="step-label">Verify</span>
          </li>
          <li class="connector"></li>
          <li class="step" data-stage="review" data-url="{{ request.url_for('stage_five_review_page') }}">
            <span class="step-index">5</span>
            <span class="step-label">Review</span>
          </li>
        </ol>
        <div class="progress-tracker-action">
          <button id="analyzeButton" class="btn-3d" type="button" disabled>
            <span class="btn-3d-shadow" aria-hidden="true"></span>
            <span class="btn-3d-edge" aria-hidden="true"></span>
            <span class="btn-3d-front">Map →</span>
          </button>
        </div>
      </div>
      <div id="stepInstruction" class="step-instruction">
        <p class="step-instruction-text"></p>
        <span class="step-instruction-tooltip" aria-hidden="true"></span>
      </div>
    </nav>

    <main class="stage-shell">
      <section id="uploadScreen" class="stage-card">
        <div class="upload-grid">
          <div class="upload-column">
            <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Upload dataset">
              <input id="fileInput" type="file" accept=".csv" hidden />
              <div id="dropzoneCopy" class="dropzone-copy">
                <div class="dropzone-icon" aria-hidden="true">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                  </svg>
                </div>
                <p class="dropzone-title">Click or drag to upload</p>
                <p class="dropzone-hint">CSV · up to {{ ui_constraints.max_mb }} MB</p>
              </div>
              <div id="dropzoneFile" class="dropzone-file hidden">
                <div class="dropzone-success-icon" aria-hidden="true">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg>
                </div>
                <p class="file-name" id="dropzoneFileName">—</p>
                <p class="file-size" id="dropzoneFileSize">—</p>
                <p class="file-status" id="dropzoneFileStatus">Waiting for upload</p>
                <button id="changeFileButton" class="linklike" type="button">Change file</button>
              </div>
            </div>
            <p id="statusMessage" class="status" role="status" aria-live="polite"></p>
          </div>

        </div>
      </section>
    </main>

    <div id="analyzeOverlay" class="analyze-overlay hidden" role="alert" aria-live="assertive">
      <div class="overlay-card">
        <p class="overlay-title">Analyzing columns</p>
        <p class="overlay-subtitle">Finding the best mappings for your data.</p>
        <div class="overlay-spinner"></div>
      </div>
    </div>

    <script>
      window.stageOneUploadConfig = {
        uploadEndpoint: "{{ request.url_for('stage_one_upload_upload') }}",
        analyzeEndpoint: "{{ request.url_for('stage_one_upload_analyze') }}",
        maxBytes: {{ ui_constraints.max_bytes }},
        targetSchema: "{{ default_schema }}",
      };
    </script>
    <script type="module" src="{{ request.url_for('stage_one_static', path='stage_1_upload.js') }}"></script>
  </body>
</html>
