<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Chord · Mapping Suggestions</title>
    <link rel="stylesheet" href="/assets/shared/tokens.css" />
    <link rel="stylesheet" href="{{ request.url_for('stage_one_static', path='stage_1_upload.css') }}" />
    <link rel="stylesheet" href="{{ request.url_for('stage_two_static', path='stage_2_mappings.css') }}" />
  </head>
  <body>
    <nav class="progress-tracker">
      <ol class="progress-track">
        <li class="step complete" data-stage="upload" data-url="{{ request.url_for('stage_one_upload_page') }}">
          <span class="step-index">1</span>
          <span class="step-label">Upload</span>
        </li>
        <li class="connector complete"></li>
        <li class="step active" data-stage="mapping" data-url="{{ request.url_for('stage_two_mapping_page') }}">
          <span class="step-index">2</span>
          <span class="step-label">Map</span>
        </li>
        <li class="connector"></li>
        <li class="step" data-stage="harmonize" data-url="{{ request.url_for('stage_three_entry') }}">
          <span class="step-index">3</span>
          <span class="step-label">Harmonize</span>
        </li>
        <li class="connector"></li>
        <li class="step" data-stage="review" data-url="{{ request.url_for('stage_four_review_page') }}">
          <span class="step-index">4</span>
          <span class="step-label">Review</span>
        </li>
        <li class="connector"></li>
        <li class="step" data-stage="export" data-url="{{ request.url_for('stage_five_review_page') }}">
          <span class="step-index">5</span>
          <span class="step-label">Download</span>
        </li>
      </ol>
      <div id="stepInstruction" class="step-instruction">
        <p class="step-instruction-text"></p>
        <span class="step-instruction-tooltip" aria-hidden="true"></span>
      </div>
    </nav>

    <main class="stage-shell">
      <div class="stage-nav">
        <button class="nav-btn nav-back" type="button" data-nav-target="{{ request.url_for('stage_one_upload_page') }}">Back</button>
        <button id="harmonizeButton" class="nav-btn nav-forward netrias-btn" type="button" disabled>Harmonize data</button>
      </div>
      <section class="stage-card">
        <div class="mapping-table-wrapper">
          <div class="mapping-legend">
            <div class="legend-item legend-item--recommended">
              <span class="legend-icon" aria-hidden="true">✓</span>
              <span class="legend-label">Use AI recommendation</span>
            </div>
            <div class="legend-item legend-item--override">
              <span class="legend-icon" aria-hidden="true">✎</span>
              <span class="legend-label">Manual override</span>
            </div>
            <div class="legend-item legend-item--no-recommendation">
              <span class="legend-icon" aria-hidden="true">○</span>
              <span class="legend-label">No recommendation</span>
            </div>
          </div>
          <div class="mapping-table-header">
            <div class="mapping-th mapping-th--status"><span class="sr-only">Status</span></div>
            <div class="mapping-th">Column</div>
            <div class="mapping-th">AI Recommended Ontology</div>
            <div class="mapping-th">Override</div>
          </div>
          <div id="mappingResults" class="mapping-table-body"></div>
        </div>
        <div id="mappingEmptyState" class="mapping-empty hidden"></div>
      </section>
    </main>

    <script>
      window.stageTwoConfig = {
        analyzeEndpoint: "{{ request.url_for('stage_one_upload_analyze') }}",
        targetSchema: "{{ default_schema }}",
        manualOptions: {{ manual_options | tojson }},
        minConfidence: 0.5,
        storageKey: 'stage2Payload',
        stageThreeUrl: "{{ request.url_for('stage_three_entry') }}",
        stageThreePayloadKey: 'stage3HarmonizePayload',
        stageThreeJobKey: 'stage3HarmonizeJob',
      };

      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.step[data-url]').forEach(step => {
          step.addEventListener('click', () => {
            const url = step.dataset.url;
            if (url) window.location.href = url;
          });
        });
        document.querySelectorAll('[data-nav-target]').forEach(button => {
          button.addEventListener('click', () => {
            const target = button.dataset.navTarget;
            if (target) {
              window.location.assign(target);
            }
          });
        });
      });
    </script>
    <script type="module" src="{{ request.url_for('stage_two_static', path='stage_2_mappings.js') }}?v=20250216"></script>
  </body>
</html>
